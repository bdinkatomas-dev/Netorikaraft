<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Cyber PvP Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background-color: #050508;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-text {
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-bottom: 5px;
        }
        #mobileControls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 10;
        }
        .touch-zone {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #joystickBound {
            width: 140px;
            height: 140px;
            position: relative;
        }
        #joystickThumb {
            width: 65px;
            height: 65px;
            background: rgba(0, 240, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            position: absolute;
            top: 35px;
            left: 35px;
            transition: transform 0.03s linear;
        }
        .action-btns {
            display: flex;
            gap: 20px;
        }
        #jumpBtn, #attackBtn {
            width: 110px;
            height: 110px;
            font-weight: 900;
            color: #fff;
            font-size: 1.2rem;
        }
        #jumpBtn {
            text-shadow: 0 0 10px #00f0ff;
            background: rgba(0, 240, 255, 0.15);
        }
        #attackBtn {
            text-shadow: 0 0 10px #ff0055;
            background: rgba(255, 0, 85, 0.15);
            border: 2px solid rgba(255, 0, 85, 0.2);
        }
        #jumpBtn:active, #attackBtn:active {
            transform: scale(0.95);
        }
        #jumpBtn:active { background: rgba(0, 240, 255, 0.4); }
        #attackBtn:active { background: rgba(255, 0, 85, 0.4); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud-text" id="hpDisplay" style="color: #00ff66; text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);">HP: 100</div>
        <div class="hud-text" style="color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);" id="killsDisplay">Zabití: 0</div>
        <div class="hud-text" style="color: #ff0055;" id="deathsDisplay">Smrti: 0</div>
        <button onclick="window.location.href='../'" style="margin-top: 15px; padding: 8px 15px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; cursor: pointer; pointer-events: auto;">Zpět do Hubu</button>
    </div>

    <div id="mobileControls">
        <div class="touch-zone" id="joystickBound">
            <div id="joystickThumb"></div>
        </div>
        <div class="action-btns">
            <div class="touch-zone" id="attackBtn">ÚTOK</div>
            <div class="touch-zone" id="jumpBtn">SKOK</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. SUPABASE CONFIG & MULTIPLAYER ---
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        const NAZEV_HRY = "PvP Arena";

        let sb = null;
        let pvpChannel = null;
        let mojeId = "guest_" + Math.floor(Math.random() * 10000);
        let mujUsername = "Hráč";
        let remotePlayers = {};

        try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.error(e); }

        async function initMultiplayer() {
            if(!sb) return;
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                mojeId = user.id;
                mujUsername = user.user_metadata.display_name || "Hráč";
                
                const updateStatus = async (status) => {
                    await sb.from('online_players').upsert({
                        id: mojeId, username: mujUsername, current_game: status, updated_at: new Date().toISOString()
                    }, { onConflict: 'id' });
                };
                
                await updateStatus(NAZEV_HRY);
                setInterval(() => updateStatus(NAZEV_HRY), 10000);
                window.addEventListener('beforeunload', () => updateStatus('Lobby'));
            }

            pvpChannel = sb.channel('pvp_arena_channel', { config: { broadcast: { self: false } } });
            
            pvpChannel.on('broadcast', { event: 'sync' }, payload => {
                const data = payload.payload;
                remotePlayers[data.id] = data;
                remotePlayers[data.id].lastSeen = Date.now();
            });

            pvpChannel.on('broadcast', { event: 'hit' }, payload => {
                const data = payload.payload;
                if (data.targetId === mojeId) {
                    takeDamage(data.damage, data.attackerName);
                }
            });

            pvpChannel.subscribe();

            setInterval(() => {
                const now = Date.now();
                for (let id in remotePlayers) {
                    if (now - remotePlayers[id].lastSeen > 3000) delete remotePlayers[id];
                }
            }, 1000);
        }
        initMultiplayer();

        // --- 2. CANVAS & ENGINE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById("mobileControls").style.display = "flex";
            }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const keys = { Left: false, Right: false, Up: false, Attack: false };
        window.addEventListener("keydown", (e) => {
            if(e.code === "ArrowLeft" || e.code === "KeyA") keys.Left = true;
            if(e.code === "ArrowRight" || e.code === "KeyD") keys.Right = true;
            if(e.code === "ArrowUp" || e.code === "KeyW") { keys.Up = true; e.preventDefault(); }
            if(e.code === "Space" || e.code === "KeyF") { triggerAttack(); e.preventDefault(); }
        });
        window.addEventListener("keyup", (e) => {
            if(e.code === "ArrowLeft" || e.code === "KeyA") keys.Left = false;
            if(e.code === "ArrowRight" || e.code === "KeyD") keys.Right = false;
            if(e.code === "ArrowUp" || e.code === "KeyW") keys.Up = false;
        });

        // Hráč data
        const player = {
            x: 200, y: 200, vx: 0, vy: 0, width: 24, height: 24,
            speed: 0.85, maxVx: 6.5, friction: 0.84, gravity: 0.6, jumpForce: -12.5,
            grounded: false, hp: 100, kills: 0, deaths: 0, color: "#00f0ff",
            facing: 1, isAttacking: false, attackTimer: 0
        };

        // Pevná, vymazlená PvP mapa (Platformy)
        const mapPlatforms = [
            { x: 50, y: 550, w: 1200, h: 40, color: "#161925" },  // Hlavní podlaha
            { x: 150, y: 420, w: 250, h: 15, color: "#161925" },
            { x: 900, y: 420, w: 250, h: 15, color: "#161925" },
            { x: 450, y: 300, w: 400, h: 15, color: "#161925" },
            { x: 200, y: 180, w: 180, h: 15, color: "#161925" },
            { x: 920, y: 180, w: 180, h: 15, color: "#161925" }
        ];

        let camera = { x: 0, y: 0 };
        let particles = [];

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 2, alpha: 1, color
                });
            }
        }

        function triggerAttack() {
            if (player.isAttacking) return;
            player.isAttacking = true;
            player.attackTimer = 10; // Útok trvá 10 snímků
            spawnParticles(player.x + (player.facing === 1 ? player.width + 10 : -10), player.y + 12, "#ff0055", 5);
            
            // Detekce zásahu u ostatních hráčů na našem klientovi (Client-side hit detection)
            let attackRange = 40;
            let attackX = player.facing === 1 ? player.x + player.width : player.x - attackRange;
            let attackY = player.y - 10;
            let attackW = attackRange;
            let attackH = player.height + 20;

            for (let id in remotePlayers) {
                let rp = remotePlayers[id];
                if (attackX < rp.x + 24 && attackX + attackW > rp.x &&
                    attackY < rp.y + 24 && attackY + attackH > rp.y) {
                    // Poslat zprávu přes Supabase, že jsme někoho trefili
                    if (pvpChannel) {
                        pvpChannel.send({
                            type: 'broadcast',
                            event: 'hit',
                            payload: { targetId: id, damage: 25, attackerName: mujUsername }
                        });
                    }
                }
            }
        }

        function takeDamage(amount, attackerName) {
            player.hp -= amount;
            if (player.hp <= 0) {
                player.hp = 100;
                player.deaths++;
                player.x = 100 + Math.random() * 1000;
                player.y = 100;
                player.vx = 0; player.vy = 0;
                spawnParticles(player.x, player.y, "#ff0055", 30);
                document.getElementById("deathsDisplay").innerText = "Smrti: " + player.deaths;
            }
            document.getElementById("hpDisplay").innerText = "HP: " + player.hp;
            spawnParticles(player.x + 12, player.y + 12, "#ffaa00", 10);
        }

        // --- 3. MOBILNÍ OVLÁDÁNÍ ---
        const joyBound = document.getElementById("joystickBound");
        const joyThumb = document.getElementById("joystickThumb");
        const jumpBtn = document.getElementById("jumpBtn");
        const attackBtn = document.getElementById("attackBtn");
        let joyActive = false, joyCenterX = 0;

        joyBound.addEventListener("touchstart", (e) => {
            joyActive = true;
            joyCenterX = joyBound.getBoundingClientRect().left + 70;
        }, { passive: true });

        joyBound.addEventListener("touchmove", (e) => {
            if(!joyActive) return;
            let displayDelta = Math.max(-42, Math.min(42, e.touches[0].clientX - joyCenterX));
            joyThumb.style.transform = `translateX(${displayDelta}px)`;
            
            if(displayDelta / 42 < -0.15) { keys.Left = true; keys.Right = false; player.facing = -1; }
            else if(displayDelta / 42 > 0.15) { keys.Right = true; keys.Left = false; player.facing = 1; }
            else { keys.Left = false; keys.Right = false; }
        }, { passive: true });

        const resetJoy = () => { joyActive = false; joyThumb.style.transform = "translateX(0px)"; keys.Left = false; keys.Right = false; };
        joyBound.addEventListener("touchend", resetJoy, { passive: true });
        
        jumpBtn.addEventListener("touchstart", () => { keys.Up = true; }, { passive: true });
        jumpBtn.addEventListener("touchend", () => { keys.Up = false; }, { passive: true });
        attackBtn.addEventListener("touchstart", () => { triggerAttack(); }, { passive: true });

        // --- 4. ENGINE FYZIKY ---
        let lastBroadcast = 0;
        function update() {
            if (keys.Left) { player.vx -= player.speed; player.facing = -1; }
            if (keys.Right) { player.vx += player.speed; player.facing = 1; }
            
            player.vx *= player.friction;
            player.vy += player.gravity;

            if (keys.Up && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            player.grounded = false;

            // X Pohyb a kolize
            player.x += player.vx;
            mapPlatforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.vx > 0) player.x = p.x - player.width;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            });

            // Y Pohyb a kolize
            player.y += player.vy;
            mapPlatforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.vy > 0) {
                        player.y = p.y - player.height; player.vy = 0; player.grounded = true;
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h; player.vy = 0;
                    }
                }
            });

            // Ochrana vypadnutí z mapy arény
            if (player.y > 800) { player.x = 400; player.y = 100; player.vx = 0; player.vy = 0; }

            // Plynulá kamera sledující střed dění
            camera.x += (player.x - canvas.width / 2 - camera.x) * 0.08;
            camera.y += (player.y - canvas.height / 1.6 - camera.y) * 0.08;

            // Částice update
            particles.forEach((pt, idx) => {
                pt.x += pt.vx; pt.y += pt.vy; pt.alpha -= 0.03;
                if(pt.alpha <= 0) particles.splice(idx, 1);
            });

            // Síťová synchronizace (20x za vteřinu) do Supabase
            if (pvpChannel && Date.now() - lastBroadcast > 50) {
                pvpChannel.send({
                    type: 'broadcast',
                    event: 'sync',
                    payload: {
                        id: mojeId, name: mujUsername, x: player.x, y: player.y,
                        facing: player.facing, isAttacking: player.isAttacking, hp: player.hp
                    }
                });
                lastBroadcast = Date.now();
            }
        }

        // --- 5. VYKRESLOVÁNÍ (Neon Cyberpunk) ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pozadí s mřížkou
            ctx.strokeStyle = "rgba(0, 240, 255, 0.03)"; ctx.lineWidth = 1;
            let mriza = 60, sX = Math.floor(camera.x / mriza) * mriza, sY = Math.floor(camera.y / mriza) * mriza;
            for (let x = sX; x < sX + canvas.width + mriza; x += mriza) { ctx.beginPath(); ctx.moveTo(x - camera.x, 0); ctx.lineTo(x - camera.x, canvas.height); ctx.stroke(); }
            for (let y = sY; y < sY + canvas.height + mriza; y += mriza) { ctx.beginPath(); ctx.moveTo(0, y - camera.y); ctx.lineTo(canvas.width, y - camera.y); ctx.stroke(); }

            ctx.save(); ctx.translate(-camera.x, -camera.y);

            // Vykreslení pevné arény
            mapPlatforms.forEach(p => {
                ctx.shadowBlur = 0; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 4); ctx.fill();
                // Neonový okraj podlahy
                ctx.strokeStyle = "#00f0ff"; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = "#00f0ff";
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.w, p.y); ctx.stroke();
            });

            // Částice efekty
            ctx.shadowBlur = 10;
            particles.forEach(pt => {
                ctx.shadowColor = pt.color; ctx.fillStyle = pt.color; ctx.globalAlpha = pt.alpha;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Ostatní online nepřátelé v PvP místnosti
            for (let id in remotePlayers) {
                let rp = remotePlayers[id];
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055"; ctx.fillStyle = "#ff0055";
                ctx.beginPath(); ctx.roundRect(rp.x, rp.y, 24, 24, 5); ctx.fill();

                // Vykreslení útoku nepřítele
                if (rp.isAttacking) {
                    ctx.fillStyle = "rgba(255, 0, 85, 0.4)"; ctx.shadowColor = "#ff0055";
                    let ax = rp.facing === 1 ? rp.x + 24 : rp.x - 40;
                    ctx.beginPath(); ctx.roundRect(ax, rp.y - 10, 40, 44, 4); ctx.fill();
                }

                // Jméno a HP bar nad nepřítelem
                ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "bold 11px Arial"; ctx.textAlign = "center";
                ctx.fillText(rp.name, rp.x + 12, rp.y - 15);
                ctx.fillStyle = "red"; ctx.fillRect(rp.x - 3, rp.y - 10, 30, 4);
                ctx.fillStyle = "green"; ctx.fillRect(rp.x - 3, rp.y - 10, (rp.hp / 100) * 30, 4);
            }

            // Můj lokální hráč
            ctx.shadowBlur = 20; ctx.shadowColor = player.color; ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 5); ctx.fill();

            // Zobrazení mého útoku (Meč/Zóna zásahu)
            if (player.isAttacking) {
                ctx.fillStyle = "rgba(0, 240, 255, 0.3)"; ctx.shadowColor = "#00f0ff";
                let ax = player.facing === 1 ? player.x + player.width : player.x - 40;
                ctx.beginPath(); ctx.roundRect(ax, player.y - 10, 40, 44, 4); ctx.fill();
            }

            ctx.restore();
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
