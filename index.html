<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netorikaraft - Klientský Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #161920;
            --bg-input: #202430;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-success: #10b981;
            --accent-success-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* --- AUTH STRÁNKA --- */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .auth-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input:focus { outline: none; border-color: var(--accent); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-hover); }

        .switch-auth {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .switch-auth span { color: var(--accent); font-weight: 500; }

        /* --- LOBBY DASHBOARD --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 700; font-size: 1.4rem; color: #00f0ff; }

        .user-badge {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn { background: transparent; color: var(--text-muted); padding: 6px 12px; font-size: 0.8rem; border: 1px solid #333; width: auto; }
        .logout-btn:hover { background: #ff4444; color: white; border-color: transparent; }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .panel-block { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 24px; }
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .game-card { background: #1e222b; border-radius: 12px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.2s; }
        .game-card:hover { transform: translateY(-4px); }
        .game-thumbnail { width: 100%; aspect-ratio: 1/1; background: #262b37; display: flex; justify-content: center; align-items: center; font-size: 2.3rem; }
        .game-info { padding: 10px; }
        .game-name { font-size: 0.9rem; font-weight: 600; }

        /* Prvky pro seznamy hráčů a přátel */
        .user-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; }
        .user-item.playable { cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .user-item.playable:hover { background: #292f3f; transform: scale(1.02); }
        
        .user-info-text { display: flex; flex-direction: column; gap: 2px; }
        .user-name-label { font-weight: 600; font-size: 0.9rem; }
        .user-status-label { font-size: 0.75rem; color: var(--accent); }
        .sm-btn { width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; font-weight: 600; }
        .btn-success { background: var(--accent-success); }
        .btn-success:hover { background: var(--accent-success-hover); }

        /* Realtime Chat */
        .chat-container { display: flex; flex-direction: column; height: 320px; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
        .chat-msg { background: var(--bg-input); padding: 8px 12px; border-radius: 8px; }
        .chat-msg-user { font-weight: 700; color: var(--accent); margin-bottom: 2px; }
        .chat-input-area { display: flex; gap: 8px; padding: 12px; background: #12141a; }
        .chat-input-area input { padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="auth-container">
            <div class="auth-card">
                <h1 id="authTitle">Netorikaraft</h1>
                <p id="authDesc">Vítej v kreativním herním světě</p>
                
                <div class="form-group"><input type="email" id="email" placeholder="E-mail"></div>
                <div class="form-group" id="usernameGroup" style="display: none;"><input type="text" id="username" placeholder="Uživatelské jméno"></div>
                <div class="form-group"><input type="password" id="password" placeholder="Heslo (min. 6 znaků)"></div>
                
                <button id="authBtn">Přihlásit se</button>
                <div class="switch-auth" id="switchMode">Nemáš účet? <span>Zaregistruj se</span></div>
            </div>
        </div>
    </div>

    <div id="clientPage" class="page">
        <header>
            <div class="logo">Netorikaraft</div>
            <div class="user-badge">
                <span id="userDisplay">Načítání...</span>
                <button class="logout-btn" id="logoutBtn">Odhlásit</button>
            </div>
        </header>

        <main class="main-content">
            <div>
                <div class="panel-block">
                    <h2 class="section-title">✨ Doporučeno pro tebe</h2>
                    <div class="games-grid" id="feedGrid"></div>
                </div>
                <div class="panel-block">
                    <h2 class="section-title">🌐 Všechny dostupné hry</h2>
                    <div class="games-grid" id="gamesGrid"></div>
                </div>
            </div>

            <div>
                <div class="panel-block">
                    <h2 class="section-title">👥 Přátelé online (Klikni pro připojení)</h2>
                    <div id="friendsList"><p style="color:var(--text-muted); font-size:0.85rem;">Nemáš žádné přátele online.</p></div>
                </div>

                <div class="panel-block">
                    <h2 class="section-title">🔍 Vyhledat hráče</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <input type="text" id="searchPlayerInput" placeholder="Uživatelské jméno...">
                        <button id="searchPlayerBtn" class="sm-btn" style="background:var(--accent); padding:0 12px;">Hledat</button>
                    </div>
                    <div id="playerSearchResults"></div>
                </div>

                <h2 class="section-title">💬 Globální Lobby Chat</h2>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Napiš zprávu v lobby...">
                        <button id="chatSendBtn" style="width: auto; padding: 0 16px;">Poslat</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";

        let sb = null; 
        let isLoginMode = true;
        let mojeId = null;
        let mujUsername = "";
        let chatKanal = null;
        let listHerCache = [];

        try {
            if (SUPABASE_URL && SUPABASE_KEY) {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) {
            console.error("Chyba inicializace Supabase:", e);
        }

        const switchMode = document.getElementById('switchMode');
        const usernameGroup = document.getElementById('usernameGroup');
        const authTitle = document.getElementById('authTitle');
        const authBtn = document.getElementById('authBtn');

        switchMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.innerText = "Netorikaraft";
                usernameGroup.style.display = "none";
                authBtn.innerText = "Přihlásit se";
                switchMode.innerHTML = "Nemáš účet? <span>Zaregistruj se</span>";
            } else {
                authTitle.innerText = "Registrace";
                usernameGroup.style.display = "block";
                authBtn.innerText = "Zaregistrovat se";
                switchMode.innerHTML = "Už máš účet? <span>Přihlas se</span>";
            }
        });

        authBtn.addEventListener('click', async () => {
            if (!sb) { alert("API klíče nejsou připraveny!"); return; }
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value.trim();

            if (!email || !password) { alert("Vyplň e-mail a heslo."); return; }

            if (isLoginMode) {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) alert("Chyba přihlášení: " + error.message);
                else checkUser();
            } else {
                if (!username) { alert("Zadej uživatelské jméno!"); return; }
                const { data, error } = await sb.auth.signUp({
                    email, password, options: { data: { display_name: username } }
                });
                if (error) alert("Chyba registrace: " + error.message);
                else { alert("Účet vytvořen! Nyní se přihlas."); switchMode.click(); }
            }
        });

        async function checkUser() {
            if (!sb) return;
            const { data: { user }, error } = await sb.auth.getUser();

            if (user && !error) {
                mojeId = user.id;
                mujUsername = user.user_metadata.display_name || user.email;
                document.getElementById('userDisplay').innerText = mujUsername;

                document.getElementById('authPage').classList.remove('active');
                document.getElementById('clientPage').classList.add('active');

                // Při zapnutí klientského hubu jsme vždy defaultně v Lobby
                await aktualizujMujHerniStav('Lobby', user.email);

                nactiKlientskaData();
                zapniRealtimeEngine(); 
            }
        }

        // --- 🚀 BEZPEČNÁ AKTUALIZACE STAVU NA SUPABASE ---
        async function aktualizujMujHerniStav(nazevHry, fallbackEmail = "") {
            if (!mojeId || !sb) return;
            
            const { error } = await sb.from('online_players').upsert({
                id: mojeId,
                username: mujUsername,
                email: fallbackEmail || undefined,
                current_game: nazevHry,
                updated_at: new Date().toISOString()
            }, { onConflict: 'id' });

            if (error) {
                console.error("Chyba zápisu stavu hry:", error);
            }
        }

        // --- SPUŠTĚNÍ HRY V NOVÉM TABU (Zajistí neustálý běh stavu) ---
        async function spustHru(nazevHry, urlPath) {
            // Změníme hru v DB, počkáme na potvrzení od Supabase
            await aktualizujMujHerniStav(nazevHry);
            // Otevřeme hru v novém okně. Lobby zůstane aktivní a dál vysílá tvůj stav!
            window.open(`https://netorikaraft.vercel.app${urlPath}`, '_blank');
        }

        async function nactiKlientskaData() {
            const { data: hry } = await sb.from('games').select('*');
            const gGrid = document.getElementById('gamesGrid');
            const fGrid = document.getElementById('feedGrid');
            
            if (hry && hry.length > 0) {
                listHerCache = hry;
                gGrid.innerHTML = "";
                fGrid.innerHTML = "";
                hry.forEach((h, index) => {
                    const cardHtml = `
                        <div class="game-card" onclick="spustHru('${h.name}', '${h.url_path}')">
                            <div class="game-thumbnail">${h.emoji}</div>
                            <div class="game-info">
                                <div class="game-name">${h.name}</div>
                            </div>
                        </div>`;
                    gGrid.innerHTML += cardHtml;
                    if (index < 2) fGrid.innerHTML += cardHtml;
                });
            }

            nactiSeznamPratel();

            if(!chatKanal) {
                chatKanal = sb.channel('lobby_global', { config: { broadcast: { self: true } } });
                chatKanal.on('broadcast', { event: 'shout' }, payload => {
                    const msgBox = document.getElementById('chatMessages');
                    const div = document.createElement('div');
                    div.className = 'chat-msg';
                    div.innerHTML = `<div class="chat-msg-user">${payload.payload.user}</div><div>${payload.payload.msg}</div>`;
                    msgBox.appendChild(div);
                    msgBox.scrollTop = msgBox.scrollHeight;
                }).subscribe();
            }
        }

        function zapniRealtimeEngine() {
            sb.channel('db_realtime_lobby')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'online_players' }, () => {
                    nactiSeznamPratel();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => {
                    nactiSeznamPratel();
                })
                .subscribe();
        }

        async function nactiSeznamPratel() {
            if (!mojeId) return;

            const { data: vazby } = await sb.from('friends').select('friend_id').eq('user_id', mojeId);
            const seznamId = vazby ? vazby.map(v => v.friend_id) : [];

            const fListDiv = document.getElementById('friendsList');

            if (seznamId.length === 0) {
                fListDiv.innerHTML = "<p style='color:var(--text-muted); font-size:0.85rem;'>Zatím nemáš žádné přátele. Najdi je níže!</p>";
                return;
            }

            const { data: onlinePratele } = await sb.from('online_players').select('*').in('id', seznamId);

            if (onlinePratele && onlinePratele.length > 0) {
                fListDiv.innerHTML = "";
                onlinePratele.forEach(p => {
                    let joinTlacitkoHtml = "";
                    let itemClass = "user-item";
                    let klikatkoHtml = "";

                    if (p.current_game !== 'Lobby') {
                        itemClass = "user-item playable";
                        klikatkoHtml = `onclick="pripojSeKPrateli('${p.current_game}')"`;
                        joinTlacitkoHtml = `<button class="sm-btn btn-success">Join</button>`;
                    }

                    fListDiv.innerHTML += `
                        <div class="${itemClass}" ${klikatkoHtml}>
                            <div class="user-info-text">
                                <span class="user-name-label">${p.username}</span>
                                <span class="user-status-label">📍 ${p.current_game}</span>
                            </div>
                            ${joinTlacitkoHtml}
                        </div>`;
                });
            } else {
                fListDiv.innerHTML = "<p style='color:var(--text-muted); font-size:0.85rem;'>Všichni tvoji přátelé jsou offline.</p>";
            }
        }

        // --- 🔥 100% FUNKČNÍ PŘIPOJENÍ K PŘÍTELI ---
        async function pripojSeKPrateli(nazevHry) {
            const nalezenaHra = listHerCache.find(h => h.name === nazevHry);
            if (nalezenaHra) {
                // Aktualizujeme náš stav, počkáme na zápis a otevřeme stejnou hru
                await aktualizujMujHerniStav(nazevHry);
                window.open(`https://netorikaraft.vercel.app${nalezenaHra.url_path}`, '_blank');
            } else {
                alert("Nelze se připojit: Tato hra nebyla nalezena v databázi.");
            }
        }

        document.getElementById('searchPlayerBtn').addEventListener('click', async () => {
            const dotaz = document.getElementById('searchPlayerInput').value.trim();
            const vysledkyDiv = document.getElementById('playerSearchResults');
            if(!dotaz) return;

            const { data: hraci, error } = await sb.from('online_players')
                .select('*')
                .ilike('username', `%${dotaz}%`)
                .not('id', 'eq', mojeId);

            if(hraci && hraci.length > 0) {
                vysledkyDiv.innerHTML = "";
                hraci.forEach(h => {
                    vysledkyDiv.innerHTML += `
                        <div class="user-item">
                            <span>${h.username}</span>
                            <button class="sm-btn" style="background:var(--accent);" onclick="pridejPritele('${h.id}')">Přidat</button>
                        </div>`;
                });
            } else {
                vysledkyDiv.innerHTML = "<p style='color:var(--text-muted); font-size:0.85rem;'>Žádný aktivní hráč s tímto jménem nebyl nalezen.</p>";
            }
        });

        async function pridejPritele(targetId) {
            const { error } = await sb.from('friends').insert({
                user_id: mojeId,
                friend_id: targetId,
                status: 'accepted'
            });

            if (error) {
                alert("Tento uživatel již v přátelích figuruje nebo nastala chyba.");
            } else {
                alert("Hráč přidán do přátel!");
                document.getElementById('playerSearchResults').innerHTML = "";
                document.getElementById('searchPlayerInput').value = "";
                nactiSeznamPratel();
            }
        }

        function odesliChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && chatKanal) {
                chatKanal.send({ type: 'broadcast', event: 'shout', payload: { user: mujUsername, msg: text } });
                input.value = "";
            }
        }

        document.getElementById('chatSendBtn').addEventListener('click', odesliChat);
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') odesliChat();
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (mojeId && sb) await sb.from('online_players').delete().eq('id', mojeId);
            if (chatKanal) chatKanal.unsubscribe();
            if (sb) await sb.auth.signOut();
            window.location.reload();
        });

        window.addEventListener('beforeunload', () => {
            if (sb && mojeId) {
                // Smaže se z online_players pouze pokud úplně zavře záložku s Lobby
                sb.from('online_players').delete().eq('id', mojeId);
            }
        });

        checkUser();
    </script>
</body>
</html>
