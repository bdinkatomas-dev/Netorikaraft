<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netorikaraft - Klientský Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #161920;
            --bg-input: #202430;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-success: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* SPA Systém přepínání obrazovek */
        .page { display: none; }
        .page.active { display: block; }

        /* --- AUTH STRÁNKA --- */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .auth-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-hover); }

        .switch-auth {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .switch-auth span { color: var(--accent); font-weight: 500; }

        /* --- LOBBY DASHBOARD --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }

        .user-badge {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn { background: transparent; color: var(--text-muted); padding: 6px 12px; font-size: 0.8rem; border: 1px solid #333; width: auto; }
        .logout-btn:hover { background: #ff4444; color: white; border-color: transparent; }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .search-box { margin-bottom: 24px; }
        .search-box input { font-size: 1.1rem; padding: 16px 20px; border-radius: 12px; }

        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .panel-block { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 24px; }

        /* Gridy a Listy */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .friends-list, .search-players-list { display: flex; flex-direction: column; gap: 10px; }

        @media (max-width: 480px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        }

        /* Herní karta */
        .game-card { background: #1e222b; border-radius: 12px; overflow: hidden; transition: transform 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .game-card:hover { transform: translateY(-4px); }
        .game-thumbnail { width: 100%; aspect-ratio: 1/1; background: #262b37; display: flex; justify-content: center; align-items: center; font-size: 2.3rem; }
        .game-info { padding: 10px; }
        .game-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-author { font-size: 0.75rem; color: var(--text-muted); }

        /* Karta uživatele / přítele */
        .user-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 10px 14px; border-radius: 8px; }
        .user-item-name { font-size: 0.9rem; font-weight: 600; }
        .user-item-status { font-size: 0.75rem; color: var(--text-muted); }
        .sm-btn { width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; }

        /* --- GLOBÁLNÍ LOBBY CHAT STYLY --- */
        .chat-container { display: flex; flex-direction: column; height: 400px; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
        .chat-msg { background: var(--bg-input); padding: 8px 12px; border-radius: 8px; word-break: break-word; }
        .chat-msg-user { font-weight: 700; color: var(--accent); margin-bottom: 2px; }
        .chat-input-area { display: flex; gap: 8px; padding: 12px; background: #12141a; }
        .chat-input-area input { padding: 10px; border-radius: 6px; }
        .chat-input-area button { width: auto; padding: 0 16px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="auth-container">
            <div class="auth-card">
                <h1 id="authTitle">Netorikaraft</h1>
                <p id="authDesc">Vítej v kreativním herním světě</p>
                
                <div class="form-group"><input type="email" id="email" placeholder="E-mail"></div>
                <div class="form-group" id="usernameGroup" style="display: none;"><input type="text" id="username" placeholder="Uživatelské jméno"></div>
                <div class="form-group"><input type="password" id="password" placeholder="Heslo"></div>
                
                <button id="authBtn">Přihlásit se</button>
                <div class="switch-auth" id="switchAuth">Nemáš účet? <span>Zaregistruj se</span></div>
            </div>
        </div>
    </div>

    <div id="clientPage" class="page">
        <header>
            <div class="logo">Netorikaraft</div>
            <div class="user-badge">
                <span id="userDisplay">Načítání...</span>
                <button class="logout-btn" id="logoutBtn">Odhlásit</button>
            </div>
        </header>

        <main class="main-content">
            <div>
                <div class="search-box">
                    <input type="text" id="searchBar" placeholder="Hledej hry, obby, tycoony...">
                </div>

                <div class="panel-block">
                    <h2 class="section-title">✨ Doporučeno pro tebe (Denní Feed)</h2>
                    <div class="games-grid" id="feedGrid"></div>
                </div>

                <div class="panel-block">
                    <h2 class="section-title">🌐 Všechny hry (Discover)</h2>
                    <div class="games-grid" id="gamesGrid"></div>
                </div>
            </div>

            <div>
                <div class="panel-block">
                    <h2 class="section-title">👥 Přátelé online</h2>
                    <div class="friends-list" id="friendsList"></div>
                </div>

                <div class="panel-block">
                    <h2 class="section-title">🔍 Najít hráče</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <input type="text" id="searchPlayerInput" placeholder="Jméno hráče..." style="padding: 8px 12px; font-size: 0.85rem;">
                        <button id="searchPlayerBtn" class="sm-btn" style="background:var(--accent);">Hledat</button>
                    </div>
                    <div class="search-players-list" id="playerSearchResults"></div>
                </div>

                <h2 class="section-title">💬 Globální Lobby Chat</h2>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Napiš zprávu...">
                        <button id="chatSendBtn">Odeslat</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIG KONTROLA: Zadej své Supabase parametry
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;
        let mojeId = null;
        let mujUsername = "";
        let chatKanal = null;

        // Elementy z DOM
        const authPage = document.getElementById('authPage');
        const clientPage = document.getElementById('clientPage');
        const authTitle = document.getElementById('authTitle');
        const authDesc = document.getElementById('authDesc');
        const usernameGroup = document.getElementById('usernameGroup');
        const authBtn = document.getElementById('authBtn');
        const switchAuth = document.getElementById('switchAuth');
        const gamesGrid = document.getElementById('gamesGrid');
        const feedGrid = document.getElementById('feedGrid');
        const friendsList = document.getElementById('friendsList');
        const searchPlayerInput = document.getElementById('searchPlayerInput');
        const searchPlayerBtn = document.getElementById('searchPlayerBtn');
        const playerSearchResults = document.getElementById('playerSearchResults');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const searchBar = document.getElementById('searchBar');
        const userDisplay = document.getElementById('userDisplay');

        // Přepínání formulářů
        switchAuth.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.innerText = "Netorikaraft"; authDesc.innerText = "Vítej v kreativním herním světě";
                usernameGroup.style.display = "none"; authBtn.innerText = "Přihlásit se";
                switchAuth.innerHTML = "Nemáš účet? <span>Zaregistruj se</span>";
            } else {
                authTitle.innerText = "Vytvořit účet"; authDesc.innerText = "Začni objevovat a budovat hry";
                usernameGroup.style.display = "block"; authBtn.innerText = "Zaregistrovat se";
                switchAuth.innerHTML = "Už máš účet? <span>Přihlas se</span>";
            }
        });

        // Přihlašovací logika
        authBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else checkUser();
            } else {
                if (!username) { alert("Zadej jméno!"); return; }
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { display_name: username } } });
                if (error) alert(error.message); else alert("Účet vytvořen, můžeš se přihlásit.");
            }
        });

        // Odhlášení
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (mojeId) await supabase.from('online_players').delete().eq('id', mojeId);
            if (chatKanal) chatKanal.unsubscribe();
            await supabase.auth.signOut();
            showPage('authPage');
        });

        function showPage(p) { authPage.classList.remove('active'); clientPage.classList.remove('active'); document.getElementById(p).classList.add('active'); }

        // Start klienta a nastavení profilu online
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                mojeId = user.id;
                mujUsername = user.user_metadata.display_name || user.email;
                userDisplay.innerText = mujUsername;
                showPage('clientPage');
                
                // Nahlášení do Lobby stavu
                await supabase.from('online_players').upsert({
                    id: mojeId, username: mujUsername, email: user.email, current_game: 'Lobby', updated_at: new Date().toISOString()
                });

                nactiHryAFeed();
                nactiPratele();
                spustRealtimeChat();

                setInterval(nactiPratele, 6000);
            } else { showPage('authPage'); }
        }

        // Algoritmus pro denní náhodný feed
        function promichej(pole) {
            for (let i = pole.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pole[i], pole[j]] = [pole[j], pole[i]];
            }
            return pole;
        }

        async function nactiHryAFeed(filtr = "") {
            let query = supabase.from('games').select('*');
            if (filtr) query = query.ilike('name', `%${filtr}%`);
            const { data: hry } = await query;
            if (!hry) return;

            vykresliHry(hry, 'gamesGrid');
            if (!filtr) vykresliHry(promichej([...hry]).slice(0, 3), 'feedGrid');
        }

        function vykresliHry(hry, elId) {
            const grid = document.getElementById(elId); grid.innerHTML = "";
            if (hry.length === 0) { grid.innerHTML = "<p style='color:var(--text-muted); font-size:0.85rem;'>Žádné položky.</p>"; return; }
            hry.forEach(hra => {
                grid.innerHTML += `
                    <div class="game-card" onclick="spustHru('${hra.url_path}', '${hra.name}')">
                        <div class="game-thumbnail">${hra.emoji}</div>
                        <div class="game-info">
                            <div class="game-name">${hra.name}</div>
                            <div class="game-author">od ${hra.creator}</div>
                        </div>
                    </div>`;
            });
        }

        // Načtení přátel a detekce tlačítka JOIN
        async function nactiPratele() {
            if (!mojeId) return;
            const { data: vztahy } = await supabase.from('friends').select('friend_id').eq('user_id', mojeId);
            friendsList.innerHTML = "";
            if (!vztahy || vztahy.length === 0) { friendsList.innerHTML = "<p style='color:var(--text-muted);font-size:0.8rem;'>Nemáš přátele.</p>"; return; }

            const ids = vztahy.map(v => v.friend_id);
            const { data: online } = await supabase.from('online_players').select('id, username, current_game').in('id', ids);

            if (!online || online.length === 0) { friendsList.innerHTML = "<p style='color:var(--text-muted);font-size:0.8rem;'>Nikdo nehraje.</p>"; return; }

            online.forEach(k => {
                const jeLobby = k.current_game === 'Lobby';
                const btn = !jeLobby ? `<button class="sm-btn" style="background:var(--accent-success);" onclick="najdiAJoinni('${k.current_game}')">JOIN</button>` : '';
                friendsList.innerHTML += `
                    <div class="user-item">
                        <div>
                            <div class="user-item-name">${k.username}</div>
                            <div class="user-item-status">${jeLobby ? 'V lobby' : 'Hraje: ' + k.current_game}</div>
                        </div>
                        ${btn}
                    </div>`;
            });
        }

        async function najdiAJoinni(nHry) {
            const { data } = await supabase.from('games').select('url_path').eq('name', nHry).single();
            if (data) spustHru(data.url_path, nHry);
        }

        async function spustHru(cesta, nazev) {
            if (mojeId) await supabase.from('online_players').update({ current_game: nazev, updated_at: new Date().toISOString() }).eq('id', mojeId);
            window.location.href = cesta;
        }

        // Hledání nových hráčů
        searchPlayerBtn.addEventListener('click', async () => {
            const jmeno = searchPlayerInput.value.trim(); if (!jmeno) return;
            playerSearchResults.innerHTML = "<p style='color:var(--text-muted); font-size:0.8rem;'>Hledám...</p>";

            const { data: nalezeni } = await supabase.from('online_players').select('id, username').ilike('username', `%${jmeno}%`).not('id', 'eq', mojeId);
            playerSearchResults.innerHTML = "";
            if (!nalezeni || nalezeni.length === 0) { playerSearchResults.innerHTML = "<p style='color:var(--text-muted); font-size:0.8rem;'>Nikdo nenalezen.</p>"; return; }

            nalezeni.forEach(h => {
                playerSearchResults.innerHTML += `
                    <div class="user-item">
                        <span class="user-item-name">${h.username}</span>
                        <button class="sm-btn" style="background:var(--accent);" onclick="pridatDoPratel('${h.id}', '${h.username}')">Přidat</button>
                    </div>`;
            });
        });

        async function pridatDoPratel(fId, fName) {
            const { error } = await supabase.from('friends').insert([{ user_id: mojeId, friend_id: fId }]);
            if (error) alert("Již jsou v přátelích!");
            else { alert(`${fName} byl přidán!`); nactiPratele(); }
        }

        // --- REALTIME CHAT SYSTÉM (P2P přes Broadcast) ---
        function spustRealtimeChat() {
            chatKanal = supabase.channel('lobby_global_chat', { config: { broadcast: { self: true } } });

            chatKanal.on('broadcast', { event: 'zprava' }, (payload) => {
                pridejZpravuDoChatu(payload.payload.autor, payload.payload.text);
            }).subscribe();
        }

        function pridejZpravuDoChatu(autor, text) {
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-msg';
            msgEl.innerHTML = `<div class="chat-msg-user">${autor}</div><div>${text}</div>`;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto scroll dolů
        }

        function odesliChat() {
            const text = chatInput.value.trim();
            if (!text || !chatKanal) return;

            chatKanal.send({
                type: 'broadcast', event: 'zprava', payload: { autor: mujUsername, text: text }
            });
            chatInput.value = "";
        }

        chatSendBtn.addEventListener('click', odesliChat);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') odesliChat(); });
        searchBar.addEventListener('input', (e) => nactiHryAFeed(e.target.value));

        checkUser();
    </script>
</body>
</html>
