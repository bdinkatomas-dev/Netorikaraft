<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netorikaraft Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121214;
            --bg-panel: #1a1a1e;
            --primary: #e50914;
            --primary-hover: #b80710;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #2a2a30;
            --success: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 40px; }
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        input { background: #26262b; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; }

        /* --- AUTH SCREEN --- */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { background: var(--bg-panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .auth-box h2 { margin-bottom: 20px; font-size: 28px; }
        .auth-box input { width: 100%; margin-bottom: 15px; }
        .auth-box button { width: 100%; padding: 12px; background: var(--primary); color: white; margin-bottom: 10px; }
        .auth-box button:hover { background: var(--primary-hover); }
        .auth-box p { color: var(--text-muted); font-size: 14px; cursor: pointer; }

        /* --- TOP BAR --- */
        .topbar { background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .logo-box { width: 24px; height: 24px; background: var(--primary); border-radius: 4px; display: inline-block; }
        .search-games { width: 350px; }
        .user-nav { display: flex; align-items: center; gap: 20px; }
        .coins-badge { background: #ffd700; color: #000; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .logout-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; }
        .logout-btn:hover { color: white; border-color: white; }

        /* --- MAIN HUB LAYOUT --- */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        section { margin-bottom: 40px; }
        h3 { font-size: 20px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

        /* Games Grid */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; overflow: hidden; transition: 0.3s; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-card h4 { font-size: 18px; margin-bottom: 5px; }
        .game-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
        .game-play-btn { width: 100%; padding: 10px; background: var(--success); color: black; font-size: 14px; text-align: center; display: block; text-decoration: none; border-radius: 6px; }

        /* Three Columns Row */
        .hub-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column; }
        
        /* Box 1: Avatar preview style */
        .avatar-preview-box { align-items: center; justify-content: center; text-align: center; }
        .avatar-render { width: 100px; height: 130px; background: #26262b; margin-bottom: 15px; border-radius: 8px; border: 2px dashed var(--border); display: flex; flex-direction: column; justify-content: center; gap: 5px; padding: 10px; }
        .av-part { width: 100%; height: 20px; border-radius: 3px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black;}
        .change-av-btn { background: var(--primary); color: white; padding: 10px 20px; width: 100%; }

        /* Box 2: Player Search */
        .search-box input { width: 100%; margin-bottom: 10px; }
        .search-results { margin-top: 10px; flex-grow: 1; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #26262b; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; }
        .add-friend-btn { background: var(--success); color: black; padding: 5px 10px; font-size: 12px; }

        /* Box 3: Friends */
        .friends-list { overflow-y: auto; max-height: 250px; }
        .friend-card { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #26262b; border-radius: 6px; margin-bottom: 8px; }
        .friend-info h5 { font-size: 15px; }
        .friend-info span { font-size: 12px; color: var(--success); }
        .join-btn { background: #00b0ff; color: white; padding: 6px 12px; font-size: 12px; text-decoration: none; border-radius: 4px; }

        /* --- SHOP / AVATAR EDITOR MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: var(--bg-panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-shop { background: transparent; color: white; font-size: 24px; }
        .shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .shop-item { background: #26262b; border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; gap: 8px; }
        .shop-item.equipped { border-color: var(--success); }
        .shop-item button { padding: 6px; font-size: 12px; background: var(--border); color: white; }
        .shop-item button.buy-btn { background: #ffd700; color: black; }
    </style>
</head>
<body>

    <div id="auth-view" class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Přihlášení</h2>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-password" placeholder="Heslo">
            <button id="auth-primary-btn" onclick="handleAuth()">Přihlásit se</button>
            <p id="auth-toggle-mode" onclick="toggleAuthMode()">Nemáš účet? Zaregistruj se zde</p>
        </div>
    </div>

    <div id="hub-view" class="hidden">
        <div class="topbar">
            <div class="logo"><span class="logo-box"></span>Netorikaraft</div>
            <input type="text" class="search-games" id="game-search-input" placeholder="Hledat hru..." oninput="searchGames()">
            <div class="user-nav">
                <div class="coins-badge">🪙 <span id="user-coins">0</span> NC</div>
                <span id="user-display-name" style="font-weight: bold;">Hráč</span>
                <button class="logout-btn" onclick="logout()">Odhlásit</button>
            </div>
        </div>

        <div class="main-container">
            <section>
                <h3>Doporučené Hry</h3>
                <div class="games-grid" id="recommended-games-container">
                    </div>
            </section>

            <div class="hub-row">
                <div class="panel avatar-preview-box">
                    <h3>Tvůj Avatar</h3>
                    <div class="avatar-render" id="avatar-live-render">
                        <div class="av-part" id="av-head">Hlava</div>
                        <div class="av-part" id="av-torso">Trup</div>
                        <div class="av-part" id="av-legs">Nohy</div>
                    </div>
                    <button class="change-av-btn" onclick="openShop()">Změnit avatara</button>
                </div>

                <div class="panel search-box">
                    <h3>Hledat Hráče</h3>
                    <input type="text" id="player-search-input" placeholder="Zadej přesné jméno hráče...">
                    <button style="padding:10px; background:#26262b; color:white;" onclick="searchPlayers()">Vyhledat</button>
                    <div class="search-results" id="player-search-results"></div>
                </div>

                <div class="panel">
                    <h3>Online Přátelé</h3>
                    <div class="friends-list" id="friends-online-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="shop-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Katalog kosmetiky</h2>
                <button class="close-shop" onclick="closeShop()">✕</button>
            </div>
            <div class="shop-grid" id="shop-items-container">
                </div>
        </div>
    </div>

    <script>
        // Inicializace Supabase Klienta
        const SUPABASE_URL = "https://plffxcrhcnzfiyluliey.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmZ4Y3JoY256Zml5bHVsaWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzkyOTUsImV4cCI6MjA5NzExNTI5NX0.pw5wcQWemaGEYylWAXdGaRm8jJWQz1HeSXedhf_sLEY";
        const supabase = typeof supabase !== 'undefined' ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : window['supabase'].createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentUserProfile = null;
        let isLoginMode = true;

        // Definice 20 basic doplňků pro obchod
        const SHOP_ITEMS = [
            { id: 1, name: "Červená Kšiltovka", type: "hat", cost: 0, color: "#ff0000" },
            { id: 2, name: "Modrá Kšiltovka", type: "hat", cost: 20, color: "#0000ff" },
            { id: 3, name: "Zlatá Koruna", type: "hat", cost: 150, color: "#ffd700" },
            { id: 4, name: "Pirátský Klobouk", type: "hat", cost: 50, color: "#333333" },
            { id: 5, name: "Sluchátka", type: "hat", cost: 40, color: "#ff00ff" },
            { id: 6, name: "Čelenka", type: "hat", cost: 10, color: "#00ff00" },
            { id: 7, name: "Zelený Trup", type: "torso", cost: 0, color: "#00ff00" },
            { id: 8, name: "Černá Mikina", type: "torso", cost: 30, color: "#111111" },
            { id: 9, name: "Oblek Gentlemana", type: "torso", cost: 100, color: "#444444" },
            { id: 10, name: "Plavecké Rychlo-triko", type: "torso", cost: 25, color: "#00d2ff" },
            { id: 11, name: "Zlaté Triko", type: "torso", cost: 200, color: "#ffaa00" },
            { id: 12, name: "Neonový dres", type: "torso", cost: 60, color: "#ccff00" },
            { id: 13, name: "Základní džíny", type: "legs", cost: 0, color: "#0000ff" },
            { id: 14, name: "Černé Kraťasy", type: "legs", cost: 15, color: "#222222" },
            { id: 15, name: "Zlaté Kalhoty", type: "legs", cost: 180, color: "#ffd700" },
            { id: 16, name: "Vojenské Maskáče", type: "legs", cost: 45, color: "#556b2f" },
            { id: 17, name: "Bílé Tepláky", type: "legs", cost: 20, color: "#ffffff" },
            { id: 18, name: "Růžová Sukně", type: "legs", cost: 35, color: "#ff66cc" },
            { id: 19, name: "Kouzelnický klobouk", type: "hat", cost: 90, color: "#4b0082" },
            { id: 20, name: "VIP Diamantový trup", type: "torso", cost: 500, color: "#b9f2ff" }
        ];

        // Sledování stavu autentizace
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById("auth-view").classList.add("hidden");
                document.getElementById("hub-view").classList.remove("hidden");
                loadUserProfile();
            } else {
                currentUser = null;
                document.getElementById("auth-view").classList.remove("hidden");
                document.getElementById("hub-view").classList.add("hidden");
            }
        });

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById("auth-title").innerText = isLoginMode ? "Přihlášení" : "Registrace";
            document.getElementById("auth-primary-btn").innerText = isLoginMode ? "Přihlásit se" : "Zaregistrovat se";
            document.getElementById("auth-toggle-mode").innerText = isLoginMode ? "Nemáš účet? Zaregistruj se zde" : "Už máš účet? Přihlas se";
        }

        async function handleAuth() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            if(!email || !password) return alert("Vyplň všechna pole!");

            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Chyba při přihlášení: " + error.message);
            } else {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) alert("Chyba při registraci: " + error.message);
                else alert("Registrace úspěšná! Zkontroluj e-mail pro potvrzení (pokud je vyžadováno).");
            }
        }

        async function logout() {
            await supabase.auth.signOut();
        }

        // --- NAČÍTÁNÍ DATA Z PROFILU & CLAIM MINCÍ (+50 za 24h) ---
        async function loadUserProfile() {
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();

            if (error || !profile) return;
            currentUserProfile = profile;

            // Správa mincí a Daily Reward přes JSONB pole avatar_data
            let avData = profile.avatar_data || {};
            if (avData.coins === undefined) avData.coins = 100; // Základní bonus pro nováčka
            if (!avData.owned_items) avData.owned_items = [1, 7, 13]; // ID defaultních věcí zdarma

            const nyní = new Date();
            const posledniClaim = avData.last_daily_claim ? new Date(avData.last_daily_claim) : null;

            // Kontrola zda uplynulo 24 hodin (86400000 ms)
            if (!posledniClaim || (nyní - posledniClaim) >= 24 * 60 * 60 * 1000) {
                avData.coins += 50;
                avData.last_daily_claim = nyní.toISOString();
                
                // Uložení aktualizovaných dat s novými mincemi zpět do Supabase
                await supabase.from('profiles').update({ avatar_data: avData }).eq('id', currentUser.id);
                alert("🪙 Obdržel jsi denní bonus 50 Netorika coinů!");
            }

            currentUserProfile.avatar_data = avData;

            // Update UI
            document.getElementById("user-display-name").innerText = profile.username;
            document.getElementById("user-coins").innerText = avData.coins;

            renderAvatarLive();
            loadRecommendedGames();
            loadFriends();
        }

        // --- KRESLENÍ LOKÁLNÍHO PREVIEW AVATARA ---
        function renderAvatarLive() {
            const avData = currentUserProfile.avatar_data;
            const hat = SHOP_ITEMS.find(i => i.id === avData.clothing.hat_id);
            const torso = SHOP_ITEMS.find(i => i.id === avData.clothing.shirt_id);
            const legs = SHOP_ITEMS.find(i => i.id === avData.clothing.pants_id);

            // Nastavení barev z dat v DB
            document.getElementById("av-head").style.backgroundColor = hat ? hat.color : avData.colors.head;
            document.getElementById("av-torso").style.backgroundColor = torso ? torso.color : avData.colors.torso;
            document.getElementById("av-legs").style.backgroundColor = legs ? legs.color : avData.colors.left_leg;
            
            document.getElementById("av-head").innerText = hat ? hat.name : "Hlava (Ovál)";
        }

        // --- ŘÁDEK 1: DOPORUČENÉ HRY (RANDOM VÝBĚR) ---
        async function loadRecommendedGames() {
            const { data: games, error } = await supabase.from('games').select('*');
            if (error || !games) return;

            // Promíchání pole pro náhodný denní/vteřinový výběr doporučených her
            const randomGames = games.sort(() => 0.5 - Math.random()).slice(0, 4);

            const container = document.getElementById("recommended-games-container");
            container.innerHTML = "";

            randomGames.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <h4>${game.title}</h4>
                        <p>Vydáno: ${game.release_year}</p>
                        <a href="${game.url_path}" class="game-play-btn" onclick="playGame('${game.id}', event)">HRÁT</a>
                    </div>
                `;
            });
        }

        // Globální vyhledávání her v horním panelu
        async function searchGames() {
            const query = document.getElementById("game-search-input").value;
            if(!query) return loadRecommendedGames();

            const { data: games } = await supabase
                .from('games')
                .select('*')
                .ilike('title', `%${query}%`);

            const container = document.getElementById("recommended-games-container");
            container.innerHTML = "";
            if(games) {
                games.forEach(game => {
                    container.innerHTML += `
                        <div class="game-card">
                            <h4>${game.title}</h4>
                            <p>Vydáno: ${game.release_year}</p>
                            <a href="${game.url_path}" class="game-play-btn" onclick="playGame('${game.id}', event)">HRÁT</a>
                        </div>
                    `;
                });
            }
        }

        // Simulace vstupu do herní místnosti (uloží do DB stav co zrovna hrajeme)
        async function playGame(gameId, event) {
            event.preventDefault();
            await supabase.from('profiles').update({ current_game_id: gameId }).eq('id', currentUser.id);
            alert(`Spouštím hru! V reálném projektu by se teď spustil tvůj engine a načetl JSON z adresy hry.`);
            loadUserProfile(); // refresh stavu
        }

        // --- BOX 2: VYHLEDÁVÁNÍ A PŘIDÁVÁNÍ HRÁČŮ ---
        async function searchPlayers() {
            const name = document.getElementById("player-search-input").value;
            const container = document.getElementById("player-search-results");
            container.innerHTML = "";

            const { data: players, error } = await supabase
                .from('profiles')
                .select('id, username')
                .eq('username', name);

            if(error || !players || players.length === 0) {
                container.innerHTML = "<p style='color:red;'>Hráč nenalezen.</p>";
                return;
            }

            players.forEach(p => {
                if (p.id === currentUser.id) return;
                container.innerHTML += `
                    <div class="player-row">
                        <span>${p.username}</span>
                        <button class="add-friend-btn" onclick="addFriend('${p.id}')">➕ Přidat</button>
                    </div>
                `;
            });
        }

        async function addFriend(friendId) {
            const { error } = await supabase.from('friends').insert([
                { user_id: currentUser.id, friend_id: friendId, status: 'accepted' }
            ]);
            if(error) alert("Přátelství již existuje nebo nastala chyba.");
            else {
                alert("Hráč byl přidán do přátel!");
                loadFriends();
            }
        }

        // --- BOX 3: ONLINE PŘÁTELÉ & JOINING SERVERŮ ---
        async function loadFriends() {
            const container = document.getElementById("friends-online-container");
            container.innerHTML = "";

            // Join dotaz na profily přátel a zjištění co hrají přes cizí klíč
            const { data: friends, error } = await supabase
                .from('friends')
                .select(`
                    friend_id,
                    profiles!friends_friend_id_fkey (
                        username,
                        current_game_id,
                        games ( title )
                    )
                `)
                .eq('user_id', currentUser.id);

            if (error || !friends || friends.length === 0) {
                container.innerHTML = "<p style='color:var(--text-muted); font-size:14px;'>Žádní přátelé online.</p>";
                return;
            }

            friends.forEach(f => {
                const p = f.profiles;
                // Zobrazujeme jen přátele, kteří zrovna hrají nějakou hru (current_game_id není null)
                if(p && p.current_game_id) {
                    container.innerHTML += `
                        <div class="friend-card">
                            <div class="friend-info">
                                <h5>${p.username}</h5>
                                <span>Hraje: ${p.games ? p.games.title : "Neznámá hra"}</span>
                            </div>
                            <a href="#" class="join-btn" onclick="playGame('${p.current_game_id}', event)">Připojit se</a>
                        </div>
                    `;
                }
            });

            if(container.innerHTML === "") {
                container.innerHTML = "<p style='color:var(--text-muted); font-size:14px;'>Všichni přátelé jsou offline v Hubu.</p>";
            }
        }

        // --- SHOP & KATALOG MANAGEMENT ---
        function openShop() {
            document.getElementById("shop-modal").classList.remove("hidden");
            renderShopItems();
        }

        function closeShop() {
            document.getElementById("shop-modal").classList.add("hidden");
        }

        function renderShopItems() {
            const container = document.getElementById("shop-items-container");
            container.innerHTML = "";
            
            const avData = currentUserProfile.avatar_data;

            SHOP_ITEMS.forEach(item => {
                const isOwned = avData.owned_items.includes(item.id);
                let isEquipped = false;
                if(item.type === 'hat' && avData.clothing.hat_id === item.id) isEquipped = true;
                if(item.type === 'torso' && avData.clothing.shirt_id === item.id) isEquipped = true;
                if(item.type === 'legs' && avData.clothing.pants_id === item.id) isEquipped = true;

                let actionBtn = "";
                if (isEquipped) {
                    actionBtn = `<button class="equipped-btn" disabled style="background:var(--success); color:black;">Nasazeno</button>`;
                } else if (isOwned) {
                    actionBtn = `<button onclick="equipItem(${item.id}, '${item.type}')">Nasadit</button>`;
                } else {
                    actionBtn = `<button class="buy-btn" onclick="buyItem(${item.id}, ${item.cost})">Koupit za 🪙${item.cost}</button>`;
                }

                container.innerHTML += `
                    <div class="shop-item ${isEquipped ? 'equipped' : ''}">
                        <div style="width:40px; height:40px; background:${item.color}; margin:0 auto; border-radius:4px;"></div>
                        <span style="font-size:13px; font-weight:bold;">${item.name}</span>
                        ${actionBtn}
                    </div>
                `;
            });
        }

        async function buyItem(itemId, cost) {
            let avData = currentUserProfile.avatar_data;
            if(avData.coins < cost) return alert("Nemáš dostatek Netorika coinů!");

            avData.coins -= cost;
            avData.owned_items.push(itemId);

            await supabase.from('profiles').update({ avatar_data: avData }).eq('id', currentUser.id);
            loadUserProfile();
            renderShopItems();
        }

        async function equipItem(itemId, type) {
            let avData = currentUserProfile.avatar_data;
            
            if(type === 'hat') avData.clothing.hat_id = itemId;
            if(type === 'torso') avData.clothing.shirt_id = itemId;
            if(type === 'legs') avData.clothing.pants_id = itemId;

            await supabase.from('profiles').update({ avatar_data: avData }).eq('id', currentUser.id);
            loadUserProfile();
            renderShopItems();
        }
    </script>
</body>
</html>
