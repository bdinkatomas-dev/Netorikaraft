<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Game Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background-color: #050508;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* --- HEADER & USER PANEL --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(0, 240, 255, 0.1);
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        .user-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-dot {
            width: 10px;
            height: 10px;
            background: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
        }

        /* --- MAIN LAYOUT --- */
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* --- GAMES SECTION --- */
        .section-title {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: rgba(20, 22, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00f0ff;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.15);
        }
        .game-emoji {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .game-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }
        .game-creator {
            font-size: 0.85rem;
            color: #8a8f9f;
        }
        .play-tag {
            margin-top: 20px;
            padding: 8px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .game-card:hover .play-tag {
            background: #00f0ff;
            color: #050508;
        }

        /* --- ONLINE PLAYERS SIDEBAR --- */
        .sidebar {
            background: rgba(15, 17, 28, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            height: fit-content;
        }
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .player-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .player-name {
            font-weight: bold;
            color: #fff;
        }
        .player-game {
            font-size: 0.8rem;
            color: #00ff66;
        }
        .player-game.in-hub {
            color: #8a8f9f;
        }
        .join-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
            transition: all 0.2s;
            pointer-events: auto;
        }
        .join-btn:hover {
            background: #ff2a73;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.7);
        }
        .no-players {
            text-align: center;
            color: #5a5f6f;
            font-size: 0.9rem;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Netorikaraft</h1>
            <div class="user-badge">
                <div class="user-dot"></div>
                <span id="localPlayerName">Načítání...</span>
            </div>
        </header>

        <div class="main-layout">
            <div>
                <div class="section-title">🕹️ Dostupné hry</div>
                <div class="games-grid" id="gamesContainer">
                    <div style="color: #00f0ff;">Načítám hry z databáze...</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="section-title" style="color: #00ff66; text-shadow: 0 0 10px rgba(0,255,102,0.3)">🟢 Kdo zrovna hraje</div>
                <div class="player-list" id="playersContainer">
                    <div class="no-players">Hledám aktivní hráče...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG SUPABASE ---
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        
        let sb = null;
        let mojeId = "guest_" + Math.floor(Math.random() * 10000);
        let mujUsername = "Hráč_" + Math.floor(Math.random() * 900 + 100);
        let globalGamesCache = []; // Uložiště stažených her pro párování tlačítka Připojit se

        try { 
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
        } catch(e) { 
            console.error("Chyba inicializace Supabase:", e); 
        }

        // --- 2. MULTIPLAYER A HEARTBEAT (UPDATE AKTIVNÍ HRY) ---
        async function initHub() {
            if(!sb) return;

            // Uchování Guest ID v prohlížeči, aby se neměnilo při každém F5
            if(localStorage.getItem('netorika_id')) mojeId = localStorage.getItem('netorika_id');
            else localStorage.setItem('netorika_id', mojeId);

            if(localStorage.getItem('netorika_name')) mujUsername = localStorage.getItem('netorika_name');
            else localStorage.setItem('netorika_name', mujUsername);

            // Kontrola přihlášeného uživatele (pokud existuje)
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                mojeId = user.id;
                mujUsername = user.user_metadata.display_name || user.email.split('@')[0];
            }

            document.getElementById("localPlayerName").innerText = mujUsername + " (Ty)";

            // Funkce pro nahlášení, že jsem v HUBU
            const updateMyStatus = async () => {
                await sb.from('online_players').upsert({
                    id: mojeId,
                    username: mujUsername,
                    current_game: "Hub", // Nastavení aktuální pozice
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });
            };

            await updateMyStatus();
            setInterval(updateMyStatus, 8000); // Heartbeat každých 8 vteřin

            // Načtení her a spuštění smyčky pro refresh online lidí
            await loadGamesFromDatabase();
            await refreshOnlinePlayers();
            setInterval(refreshOnlinePlayers, 3000); // Obnovení seznamu lidí každé 3 vteřiny
        }

        // --- 3. NAČTIDÁNÍ HER Z TABULKY 'GAMES' ---
        async function loadGamesFromDatabase() {
            if(!sb) return;
            try {
                const { data, error } = await sb.from('games').select('*');
                if (error) throw error;

                globalGamesCache = data || [];
                const container = document.getElementById("gamesContainer");
                container.innerHTML = "";

                if (globalGamesCache.length === 0) {
                    container.innerHTML = "<div style='color: #ff5555;'>V tabulce 'games' nebyly nalezeny žádné hry.</div>";
                    return;
                }

                globalGamesCache.forEach(game => {
                    // game obsahuje: id, name, creator, url_part, emoji
                    const card = document.createElement("div");
                    card.className = "game-card";
                    card.onclick = () => {
                        window.location.href = game.url_part;
                    };

                    card.innerHTML = `
                        <div class="game-emoji">${game.emoji || '🎮'}</div>
                        <div class="game-name">${game.name}</div>
                        <div class="game-creator">Autor: ${game.creator || 'Neznámý'}</div>
                        <div class="play-tag">Spustit hru</div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Chyba při stahování tabulky games:", err);
                document.getElementById("gamesContainer").innerHTML = "<div style='color: #ff5555;'>Nelze načíst seznam her.</div>";
            }
        }

        // --- 4. NAČÍTÁNÍ ONLINE HRÁČŮ A TLAČÍTKO PŘIPOJIT SE ---
        async function refreshOnlinePlayers() {
            if(!sb) return;
            try {
                const { data, error } = await sb.from('online_players').select('*');
                if (error) throw error;

                const container = document.getElementById("playersContainer");
                container.innerHTML = "";

                const nyní = Date.now();
                let nekdoOnline = false;

                data.forEach(player => {
                    // Odfiltrujeme sami sebe a lidi, co neodpověděli déle než 25 vteřin (offline)
                    const casZmeny = Date.parse(player.updated_at);
                    if (player.id === mojeId || (nyní - casZmeny > 25000)) return;

                    nekdoOnline = true;
                    const row = document.createElement("div");
                    row.className = "player-row";

                    const isInGame = player.current_game && player.current_game !== "Hub" && player.current_game !== "Lobby";
                    
                    // Najdeme hru v cache, abychom získali její přesné url_part
                    const prirazenaHra = globalGamesCache.find(g => g.name.toLowerCase() === player.current_game.toLowerCase());

                    let actionHtml = "";
                    if (isInGame && prirazenaHra) {
                        // Pokud hraje hru, která existuje v tabulce games, vytvoříme 100% funkční Join Button
                        actionHtml = `<button class="join-btn" onclick="window.location.href='${prirazenaHra.url_part}'">Připojit se</button>`;
                    }

                    row.innerHTML = `
                        <div class="player-info">
                            <div class="player-name">${player.username}</div>
                            <div class="player-game ${!isInGame ? 'in-hub' : ''}">${isInGame ? 'Hraje: ' + player.current_game : 'Prohlíží Hub'}</div>
                        </div>
                        ${actionHtml}
                    `;
                    container.appendChild(row);
                });

                if (!nekdoOnline) {
                    container.innerHTML = `<div class="no-players">Momentálně tu nikdo další není.</div>`;
                }

            } catch (err) {
                console.error("Chyba při načítání hráčů:", err);
            }
        }

        // Spuštění Hubu při načtení stránky
        window.onload = initHub;
    </script>
</body>
</html>
