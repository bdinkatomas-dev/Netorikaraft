<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - 3D Mega Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-nav: rgba(22, 25, 32, 0.9);
            --accent: #3b82f6;
            --text-main: #f3f4f6;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0; padding: 0;
        }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0e12;
            font-family: 'Inter', sans-serif;
        }

        /* 3D PLÁTNO PŘES CELOU OBRAZOVKU */
        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
            z-index: 1;
        }

        #gameHeader {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 12px 24px;
            background: var(--bg-nav);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .logo-icon { font-size: 1.4rem; }
        .brand-name { font-weight: 700; font-size: 1.1rem; }
        .game-tag { background: #202430; color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .level-tag { background: #10b981; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }

        .btn-leave {
            background: var(--danger); color: white; border: none;
            padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-leave:hover { background: var(--danger-hover); }

        /* MOBILNÍ DOTYKOVÉ ELEMENTY */
        #mobileControls {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            padding: 0 40px;
            display: none; 
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .move-btns { display: flex; gap: 24px; pointer-events: auto; }
        .action-btns { pointer-events: auto; }

        .joy-btn {
            width: 75px; height: 75px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; color: white; font-size: 2rem;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px); touch-action: none;
        }
        .joy-btn:active { background: rgba(59, 130, 246, 0.6); border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="logo-icon">🧱</span>
            <span class="brand-name">Netorikaraft 3D</span>
            <span class="game-tag" id="dynamicGameName">3D Mega Obby</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="gameCanvas"></div>

    <div id="mobileControls">
        <div class="move-btns">
            <div class="joy-btn" id="btnLeft">◀</div>
            <div class="joy-btn" id="btnRight">▶</div>
        </div>
        <div class="action-btns">
            <div class="joy-btn" id="btnJump" style="width: 90px; height: 90px; font-size: 1.2rem; font-weight: bold;">JUMP</div>
        </div>
    </div>

    <script>
        // --- KLÍČE PRO SUPABASE (POKUD CHYBÍ, HRA BĚŽÍ BEZ CHYBY AUTOMATICKY OFFLINE) ---
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        
        let sb = null;
        let mojeId = null;
        let mujUsername = "Hráč";
        let mojeBarva = Math.floor(Math.random() * 16777215); 
        let mujLevel = 1;
        let mmoKanal = null;
        let vzdaleniHraci = {};

        // Bezpečná inicializace databáze
        try {
            if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_URL !== "TVOJE_SUPABASE_URL") {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.log("Supabase se nepodařilo připojit, zapínám offline režim."); }

        let scena, kamera, renderer;
        let lokalniKontejnerAvatar; 
        let urovenObjekty = []; 
        let animacniCas = 0;

        // Fyzika 3D hráče
        const hrac = {
            x: 0, y: 4, z: 0,
            rychlostX: 0, rychlostY: 0,
            veVzduchu: false, sirka: 1.0, vyska: 2.0
        };

        const gravitace = 0.24;
        const klavesy = {};
        let isMobile = false;
        const touchStav = { left: false, right: false, jump: false };

        // Inicializace kompletní 3D grafiky
        function init3D() {
            const container = document.getElementById('gameCanvas');
            
            scena = new THREE.Scene();
            scena.background = new THREE.Color(0x0d0e12);
            scena.fog = new THREE.FogExp2(0x0d0e12, 0.015);

            kamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimalizace pro slabší mobily
            container.appendChild(renderer.domElement);

            // Nastavení světla
            const ambientniSvetlo = new THREE.AmbientLight(0xffffff, 0.7);
            scena.add(ambientniSvetlo);

            const slunce = new THREE.DirectionalLight(0xffffff, 0.8);
            slunce.position.set(10, 25, 15);
            scena.add(slunce);

            // Generování vizuálního avatara
            lokalniKontejnerAvatar = vytvorHezkehoAvatara(mojeBarva);
            scena.add(lokalniKontejnerAvatar);

            window.addEventListener('resize', onWindowResize);
        }

        // Tvorba voxelového 3D avatara
        function vytvorHezkehoAvatara(barvaHex) {
            const kontejner = new THREE.Group();

            const matTelo = new THREE.MeshBasicMaterial({ color: barvaHex });
            const matKuzg = new THREE.MeshBasicMaterial({ color: 0xffdbac }); 
            const matObleceni = new THREE.MeshBasicMaterial({ color: 0x1f2937 });

            // Tělo
            const gTelo = new THREE.BoxGeometry(0.9, 1.1, 0.5);
            const mTelo = new THREE.Mesh(gTelo, matTelo);
            mTelo.position.y = 1.05;
            kontejner.add(mTelo);

            // Hlava
            const gHlava = new THREE.BoxGeometry(0.55, 0.55, 0.55);
            const mHlava = new THREE.Mesh(gHlava, matKuzg);
            mHlava.position.y = 1.9;
            kontejner.add(mHlava);

            // Vlasy / Čepice
            const gVlasy = new THREE.BoxGeometry(0.58, 0.15, 0.58);
            const mVlasy = new THREE.Mesh(gVlasy, matObleceni);
            mVlasy.position.y = 2.2;
            kontejner.add(mVlasy);

            // Nohy
            const gNoha = new THREE.BoxGeometry(0.3, 0.5, 0.35);
            const mNohaL = new THREE.Mesh(gNoha, matObleceni);
            mNohaL.position.set(-0.22, 0.25, 0);
            kontejner.add(mNohaL);

            const mNohaP = mNohaL.clone();
            mNohaP.position.x = 0.22;
            kontejner.add(mNohaP);

            // Ruce
            const gRuka = new THREE.BoxGeometry(0.25, 0.8, 0.25);
            const mRukaL = new THREE.Mesh(gRuka, matTelo);
            mRukaL.position.set(-0.6, 1.0, 0);
            kontejner.add(mRukaL);

            const mRukaP = mRukaL.clone();
            mRukaP.position.x = 0.6;
            kontejner.add(mRukaP);

            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP, rukaL: mRukaL, rukaP: mRukaP };
            return kontejner;
        }

        let aktualniLevelData = { platformy: [], lava: [], cil: {} };

        // Sestavení herních platforem
        function sestav3DLevel(n) {
            urovenObjekty.forEach(obj => scena.remove(obj));
            urovenObjekty = [];
            aktualniLevelData = { platformy: [], lava: [], cil: {} };

            const matPlatforma = new THREE.MeshBasicMaterial({ color: 0x252b36 });
            const matLava = new THREE.MeshBasicMaterial({ color: 0xef4444 });
            const matCil = new THREE.MeshBasicMaterial({ color: 0x10b981, transparent: true, opacity: 0.7 });

            // Startovní plocha
            const gStart = new THREE.BoxGeometry(6, 3, 5);
            const mStart = new THREE.Mesh(gStart, matPlatforma);
            mStart.position.set(0, -1.5, 0);
            scena.add(mStart);
            urovenObjekty.push(mStart);
            aktualniLevelData.platformy.push({ x: 0, y: 0, w: 6, h: 3 });

            const pocetSkoku = 6;
            let nastepX = 6;
            let nastepY = 0;

            for(let i=1; i<=pocetSkoku; i++) {
                const sirkaKostky = Math.max(1.6, 3.5 - (n * 0.02));
                const dalkaX = 4.2 + (Math.sin(n * i) * 0.5);
                const posunY = Math.cos(n * i + 1) * 0.8;
                nastepY += posunY;

                if (nastepY > 2.5) nastepY = 2.5;
                if (nastepY < -2.5) nastepY = -1;

                nastepX += dalkaX;

                const gPlat = new THREE.BoxGeometry(sirkaKostky, 0.8, 3);
                const mPlat = new THREE.Mesh(gPlat, matPlatforma);
                mPlat.position.set(nastepX, nastepY - 0.4, 0);
                scena.add(mPlat);
                urovenObjekty.push(mPlat);

                aktualniLevelData.platformy.push({ x: nastepX, y: nastepY, w: sirkaKostky, h: 0.8 });

                // Přidání lávových překážek od levelu 10
                if (n >= 10 && (n + i) % 3 === 0) {
                    const gSpike = new THREE.BoxGeometry(0.5, 0.5, 3);
                    const mSpike = new THREE.Mesh(gSpike, matLava);
                    mSpike.position.set(nastepX, nastepY + 0.2, 0);
                    scena.add(mSpike);
                    urovenObjekty.push(mSpike);
                    aktualniLevelData.lava.push({ x: nastepX, y: nastepY + 0.45, w: 0.5, h: 0.5 });
                }
            }

            // Konec
            nastepX += 6;
            const gKon = new THREE.BoxGeometry(5, 3, 5);
            const mKon = new THREE.Mesh(gKon, matPlatforma);
            mKon.position.set(nastepX, nastepY - 1.5, 0);
            scena.add(mKon);
            urovenObjekty.push(mKon);
            aktualniLevelData.platformy.push({ x: nastepX, y: nastepY, w: 5, h: 3 });

            // Velká láva dole pod celou mapou
            const gMegaLava = new THREE.BoxGeometry(nastepX * 2.5, 1, 15);
            const mMegaLava = new THREE.Mesh(gMegaLava, matLava);
            mMegaLava.position.set(nastepX / 2, -8, 0);
            scena.add(mMegaLava);
            urovenObjekty.push(mMegaLava);
            aktualniLevelData.lava.push({ x: nastepX / 2, y: -7.5, w: nastepX * 2.5, h: 1 });

            // Brána
            const gBrana = new THREE.BoxGeometry(1.2, 2.5, 2.5);
            const mBrana = new THREE.Mesh(gBrana, matCil);
            mBrana.position.set(nastepX, nastepY + 1.25, 0);
            scena.add(mBrana);
            urovenObjekty.push(mBrana);
            aktualniLevelData.cil = { x: nastepX, y: nastepY, w: 1.2, h: 2.5 };
        }

        // Start celého enginu
        async function startEngine() {
            init3D();
            
            // Konfigurace ovladačů mobil / PC
            isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'flex';
                const bindTouch = (id, klic) => {
                    const el = document.getElementById(id);
                    if(el) {
                        el.addEventListener('touchstart', (e) => { e.preventDefault(); touchStav[klic] = true; });
                        el.addEventListener('touchend', (e) => { e.preventDefault(); touchStav[klic] = false; });
                    }
                };
                bindTouch('btnLeft', 'left'); bindTouch('btnRight', 'right'); bindTouch('btnJump', 'jump');
            }

            window.addEventListener('keydown', e => klavesy[e.code] = true);
            window.addEventListener('keyup', e => klavesy[e.code] = false);

            sestav3DLevel(mujLevel);

            if (!sb) { loop(); return; }

            try {
                const { data: gData } = await sb.from('games').select('name').ilike('url_path', '%obby-hra%').maybeSingle();
                let jmenoHry = gData ? gData.name : "3D Mega Obby";
                document.getElementById('dynamicGameName').innerText = jmenoHry;

                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    mojeId = user.id;
                    mujUsername = user.user_metadata.display_name || user.email;
                    await sb.from('online_players').update({ current_game: jmenoHry, updated_at: new Date().toISOString() }).eq('id', mojeId);

                    mmoKanal = sb.channel('obby_3d_room', { config: { broadcast: { self: false } } });
                    mmoKanal.on('broadcast', { event: 'tick' }, payload => {
                        const d = payload.payload;
                        if (!vzdaleniHraci[d.id]) {
                            const novy3DAvatar = vytvorHezkehoAvatara(d.color);
                            scena.add(novy3DAvatar);
                            vzdaleniHraci[d.id] = { obj: novy3DAvatar };
                        }
                        const v = vzdaleniHraci[d.id];
                        v.username = d.username; v.x = d.x; v.y = d.y; v.level = d.level;
                        v.rychlostX = d.rychlostX; v.tickTime = Date.now();
                    }).subscribe();

                    setInterval(() => {
                        if (mmoKanal) {
                            mmoKanal.send({
                                type: 'broadcast', event: 'tick',
                                payload: { id: mojeId, username: mujUsername, x: hrac.x, y: hrac.y, color: mojeBarva, level: mujLevel, rychlostX: hrac.rychlostX }
                            });
                        }
                    }, 30);
                }
            } catch(e) { console.log("Chyba synchronizace uživatele, pokračuji v lokálním režimu."); }

            loop();
        }

        // Hlavní smyčka vykreslování (Fyzika, Animace a Kamera)
        function loop() {
            requestAnimationFrame(loop);

            // Výpočet pohybu X
            if (klavesy['ArrowRight'] || klavesy['KeyD'] || touchStav.right) {
                hrac.rychlostX = 0.13;
                lokalniKontejnerAvatar.rotation.y = Math.PI / 2;
            } else if (klavesy['ArrowLeft'] || klavesy['KeyA'] || touchStav.left) {
                hrac.rychlostX = -0.13;
                lokalniKontejnerAvatar.rotation.y = -Math.PI / 2;
            } else {
                hrac.rychlostX *= 0.75;
            }

            // Výpočet skoku Y
            if ((klavesy['ArrowUp'] || klavesy['Space'] || klavesy['KeyW'] || touchStav.jump) && !hrac.veVzduchu) {
                hrac.rychlostY = 3.8;
                hrac.veVzduchu = true;
            }

            hrac.rychlostY -= gravitace * 0.16;
            hrac.x += hrac.rychlostX;
            hrac.y += hrac.rychlostY;

            // Logika 3D kolizí
            hrac.veVzduchu = true;
            aktualniLevelData.platformy.forEach(p => {
                if (hrac.x + hrac.sirka/2 > p.x - p.w/2 && hrac.x - hrac.sirka/2 < p.x + p.w/2) {
                    if (hrac.y >= p.y && hrac.y + hrac.rychlostY <= p.y + 0.15 && hrac.rychlostY <= 0) {
                        hrac.rychlostY = 0;
                        hrac.y = p.y;
                        hrac.veVzduchu = false;
                    }
                }
            });

            // Kolize s lávou
            aktualniLevelData.lava.forEach(l => {
                if (hrac.x + hrac.sirka/2 > l.x - l.w/2 && hrac.x - hrac.sirka/2 < l.x + l.w/2) {
                    if (hrac.y <= l.y && hrac.y >= l.y - 0.7) restartHry();
                }
            });

            // Kolize s cílovou bránou
            const c = aktualniLevelData.cil;
            if (c && hrac.x + hrac.sirka/2 > c.x - c.w/2 && hrac.x - hrac.sirka/2 < c.x + c.w/2) {
                if (hrac.y >= c.y && hrac.y <= c.y + c.h) {
                    if (mujLevel < 100) {
                        mujLevel++;
                        document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`;
                        sestav3DLevel(mujLevel);
                        restartHry();
                    } else {
                        alert("👑 Ovládl jsi celé 3D MMO Obby!");
                        mujLevel = 1; sestav3DLevel(mujLevel); restartHry();
                    }
                }
            }

            if (hrac.y < -6) restartHry();

            // Pozice lokálního avatara
            lokalniKontejnerAvatar.position.set(hrac.x, hrac.y, hrac.z);

            // Animace chůze končetin
            if (Math.abs(hrac.rychlostX) > 0.01 && !hrac.veVzduchu) {
                animacniCas += 0.22;
                lokalniKontejnerAvatar.userData.nohaL.rotation.z = Math.sin(animacniCas) * 0.6;
                lokalniKontejnerAvatar.userData.nohaP.rotation.z = -Math.sin(animacniCas) * 0.6;
                lokalniKontejnerAvatar.userData.rukaL.rotation.z = -Math.sin(animacniCas) * 0.4;
                lokalniKontejnerAvatar.userData.rukaP.rotation.z = Math.sin(animacniCas) * 0.4;
            } else {
                lokalniKontejnerAvatar.userData.nohaL.rotation.z = 0;
                lokalniKontejnerAvatar.userData.nohaP.rotation.z = 0;
                lokalniKontejnerAvatar.userData.rukaL.rotation.z = 0;
                lokalniKontejnerAvatar.userData.rukaP.rotation.z = 0;
            }

            // Filtrování a správa multiplayeru
            const nyni = Date.now();
            for (let id in vzdaleniHraci) {
                const v = vzdaleniHraci[id];
                if (nyni - v.tickTime > 3000) {
                    scena.remove(v.obj);
                    delete vzdaleniHraci[id];
                    continue;
                }

                // Izolace levelů
                if (v.level === mujLevel) {
                    v.obj.visible = true;
                    v.obj.position.set(v.x, v.y, 0);
                    if (Math.abs(v.rychlostX) > 0.01) {
                        v.obj.rotation.y = v.rychlostX > 0 ? Math.PI / 2 : -Math.PI / 2;
                        v.obj.userData.nohaL.rotation.z = Math.sin(nyni * 0.01) * 0.6;
                        v.obj.userData.nohaP.rotation.z = -Math.sin(nyni * 0.01) * 0.6;
                    }
                } else {
                    v.obj.visible = false;
                }
            }

            // Hladký pohyb kamery za hráčem
            kamera.position.set(hrac.x, hrac.y + 2.5, hrac.z + 9.5);
            kamera.lookAt(hrac.x, hrac.y + 0.8, hrac.z);

            renderer.render(scena, kamera);
        }

        function restartHry() {
            hrac.x = 0; hrac.y = 3; hrac.rychlostX = 0; hrac.rychlostY = 0;
        }

        function onWindowResize() {
            kamera.aspect = window.innerWidth / window.innerHeight;
            kamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function vratSeDoLobby() {
            if (sb && mojeId) {
                try {
                    await sb.from('online_players').update({ current_game: 'Lobby', updated_at: new Date().toISOString() }).eq('id', mojeId);
                } catch(e){}
            }
            window.location.href = '../index.html';
        }

        // Spuštění hry
        window.onload = () => {
            startEngine();
        };
    </script>
</body>
</html>
