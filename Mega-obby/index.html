<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - 3D Mega Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-nav: rgba(22, 25, 32, 0.9);
            --accent: #3b82f6;
            --text-main: #f3f4f6;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0; padding: 0;
        }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0e12;
            font-family: 'Inter', sans-serif;
        }

        /* 3D CANVAS */
        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
            z-index: 1;
        }

        /* UI LIŠTA */
        #gameHeader {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 12px 24px;
            background: var(--bg-nav);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .logo-icon { font-size: 1.4rem; }
        .brand-name { font-weight: 700; font-size: 1.1rem; }
        .game-tag { background: #202430; color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .level-tag { background: #10b981; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }

        .btn-leave {
            background: var(--danger); color: white; border: none;
            padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-leave:hover { background: var(--danger-hover); }

        /* MOBILNÍ LAYOUT */
        #mobileControls {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            padding: 0 40px;
            display: none; 
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .move-btns { display: flex; gap: 24px; pointer-events: auto; }
        .action-btns { pointer-events: auto; }

        .joy-btn {
            width: 75px; height: 75px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; color: white; font-size: 2rem;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px); touch-action: none;
        }
        .joy-btn:active { background: rgba(59, 130, 246, 0.6); border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="logo-icon">🧱</span>
            <span class="brand-name">Netorikaraft 3D</span>
            <span class="game-tag" id="dynamicGameName">Načítání...</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="gameCanvas"></div>

    <div id="mobileControls">
        <div class="move-btns">
            <div class="joy-btn" id="btnLeft">◀</div>
            <div class="joy-btn" id="btnRight">▶</div>
        </div>
        <div class="action-btns">
            <div class="joy-btn" id="btnJump" style="width: 90px; height: 90px; font-size: 1.2rem; font-weight: bold;">JUMP</div>
        </div>
    </div>

    <script>
        // --- ADRESY PRO SUPABASE ---
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        
        let sb = null;
        let mojeId = null;
        let mujUsername = "Hráč";
        let mojeBarva = Math.floor(Math.random()*16777215); // Hexadecimální číslo pro Three.js materiál
        let mujLevel = 1;
        let mmoKanal = null;
        let vzdaleniHraci = {};

        try {
            if (SUPABASE_URL !== "TVOJE_SUPABASE_URL") {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.error(e); }

        // ================= 🌲 THREE.JS GLOBÁLNÍ SETUP SÍTĚ =================
        let scena, kamera, renderer;
        let lokalniKontejnerAvatar; // Objekt držící celého našeho 3D panáčka
        let urovenObjekty = []; // Drží aktuální kostky 3D levelu
        let animacniCas = 0;

        // Fyzikální model přesunutý do 3D (osa X = pohyb, osa Y = skok, osa Z = hloubka pevná)
        const hrac = {
            x: 0, y: 5, z: 0,
            rychlostX: 0, rychlostY: 0,
            veVzduchu: false, sirka: 1.2, vyska: 2.2
        };

        const gravitace = 0.28;
        const klavesy = {};
        let isMobile = false;
        const touchStav = { left: false, right: false, jump: false };

        function init3D() {
            const container = document.getElementById('gameCanvas');
            
            scena = new THREE.Scene();
            scena.background = new THREE.Color(0x0d0e12);
            scena.fog = new THREE.FogExp2(0x0d0e12, 0.015); // Mlha pro epickou atmosféru

            kamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Světla v prostoru
            const ambientniSvetlo = new THREE.AmbientLight(0xffffff, 0.6);
            scena.add(ambientniSvetlo);

            const slunce = new THREE.DirectionalLight(0xffffff, 0.8);
            slunce.position.set(10, 30, 20);
            slunce.castShadow = true;
            scena.add(slunce);

            // Sestavení našeho vlastního vizuálně hezkého 3D avatara
            lokalniKontejnerAvatar = vytvorHezkehoAvatara(mojeBarva);
            scena.add(lokalniKontejnerAvatar);

            window.addEventListener('resize', onWindowResize);
        }

        // ================= 👤 GENERÁTOR HEZKÉHO ROBLOX/MINECRAFT AVATARA =================
        function vytvorHezkehoAvatara(barvaHex) {
            const kontejner = new THREE.Group();

            const matTelo = new THREE.MeshStandardMaterial({ color: barvaHex, roughness: 0.4 });
            const matKuzg = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.5 }); // Barva kůže obličeje
            const matObleceni = new THREE.MeshStandardMaterial({ color: 0x222222 });

            // Tělo / Tričko
            const gTelo = new THREE.BoxGeometry(1, 1.2, 0.6);
            const mTelo = new THREE.Mesh(gTelo, matTelo);
            mTelo.position.y = 1.1;
            mTelo.castShadow = true;
            kontejner.add(mTelo);

            // Hlava
            const gHlava = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const mHlava = new THREE.Mesh(gHlava, matKuzg);
            mHlava.position.y = 2.0;
            mHlava.castShadow = true;
            kontejner.add(mHlava);

            // Čepice / Vlasy pro hezčí vzhled
            const gVlasy = new THREE.BoxGeometry(0.64, 0.2, 0.64);
            const mVlasy = new THREE.Mesh(gVlasy, matObleceni);
            mVlasy.position.y = 2.3;
            kontejner.add(mVlasy);

            // Noha Levá
            const gNohaL = new THREE.BoxGeometry(0.35, 0.6, 0.4);
            const mNohaL = new THREE.Mesh(gNohaL, matObleceni);
            mNohaL.position.set(-0.25, 0.3, 0);
            mNohaL.castShadow = true;
            kontejner.add(mNohaL);

            // Noha Pravá
            const mNohaP = mNohaL.clone();
            mNohaP.position.x = 0.25;
            kontejner.add(mNohaP);

            // Ruka Levá
            const gRukaL = new THREE.BoxGeometry(0.3, 0.9, 0.3);
            const mRukaL = new THREE.Mesh(gRukaL, matTelo);
            mRukaL.position.set(-0.7, 1.1, 0);
            kontejner.add(mRukaL);

            // Ruka Pravá
            const mRukaP = mRukaL.clone();
            mRukaP.position.x = 0.7;
            kontejner.add(mRukaP);

            // Uložíme si reference na končetiny pro budoucí běhové animace
            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP, rukaL: mRukaL, rukaP: mRukaP };

            return kontejner;
        }

        // ================= 🏗️ PROCEDURÁLNÍ 3D GENERÁTOR LEVELŮ (1 AŽ 100) =================
        let aktualniLevelData = { platformy: [], lava: [], cil: {} };

        function sestav3DLevel(n) {
            // Smazání starého levelu ze scény
            urovenObjekty.forEach(obj => scena.remove(obj));
            urovenObjekty = [];
            aktualniLevelData = { platformy: [], lava: [], cil: {} };

            const matPlatforma = new THREE.MeshStandardMaterial({ color: 0x161920, roughness: 0.6 });
            const matLava = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xff0000, roughness: 0.2 });
            const matCil = new THREE.MeshStandardMaterial({ color: 0x10b981, transparent: true, opacity: 0.8 });

            // 1. Startovní zóna
            const gStart = new THREE.BoxGeometry(8, 4, 6);
            const mStart = new THREE.Mesh(gStart, matPlatforma);
            mStart.position.set(0, -2, 0);
            mStart.receiveShadow = true;
            scena.add(mStart);
            urovenObjekty.push(mStart);
            aktualniLevelData.platformy.push({ x: 0, y: 0, w: 8, h: 4, z: 0, d: 6 });

            const pocetSkoku = 7;
            let nastepX = 7;
            let nastepY = 0;

            // Deterministická generace identické 3D trasy pro všechny
            for(let i=1; i<=pocetSkoku; i++) {
                const sirkaKostky = Math.max(1.8, 4.0 - (n * 0.02));
                const dalkaX = 4.5 + (Math.sin(n * i) * 0.8);
                const posunY = Math.cos(n * i + 2) * 1.2;
                nastepY += posunY;

                if (nastepY > 3) nastepY = 3;
                if (nastepY < -3) nastepY = -1;

                nastepX += dalkaX;

                const gPlat = new THREE.BoxGeometry(sirkaKostky, 1, 3);
                const mPlat = new THREE.Mesh(gPlat, matPlatforma);
                mPlat.position.set(nastepX, nastepY - 0.5, 0);
                mPlat.receiveShadow = true;
                mPlat.castShadow = true;
                scena.add(mPlat);
                urovenObjekty.push(mPlat);

                aktualniLevelData.platformy.push({ x: nastepX, y: nastepY, w: sirkaKostky, h: 1, z: 0, d: 3 });

                // Lávové hroty/kostky přímo na platformách od levelu 10
                if (n >= 10 && (n + i) % 3 === 0) {
                    const gSpike = new THREE.BoxGeometry(0.6, 0.6, 3);
                    const mSpike = new THREE.Mesh(gSpike, matLava);
                    mSpike.position.set(nastepX, nastepY + 0.3, 0);
                    scena.add(mSpike);
                    urovenObjekty.push(mSpike);
                    aktualniLevelData.lava.push({ x: nastepX, y: nastepY + 0.6, w: 0.6, h: 0.6 });
                }
            }

            // Velká koncová plošina
            nastepX += 7;
            const gKon = new THREE.BoxGeometry(6, 4, 6);
            const mKon = new THREE.Mesh(gKon, matPlatforma);
            mKon.position.set(nastepX, nastepY - 2, 0);
            mKon.receiveShadow = true;
            scena.add(mKon);
            urovenObjekty.push(mKon);
            aktualniLevelData.platformy.push({ x: nastepX, y: nastepY, w: 6, h: 4, z: 0, d: 6 });

            // Obří láva pod celým světem
            const gMegaLava = new THREE.BoxGeometry(nastepX * 2, 1, 20);
            const mMegaLava = new THREE.Mesh(gMegaLava, matLava);
            mMegaLava.position.set(nastepX / 2, -10, 0);
            scena.add(mMegaLava);
            urovenObjekty.push(mMegaLava);
            aktualniLevelData.lava.push({ x: nastepX / 2, y: -9.5, w: nastepX * 2, h: 1 });

            // Zelená cílová brána
            const gBrana = new THREE.BoxGeometry(1.5, 3, 3);
            const mBrana = new THREE.Mesh(gBrana, matCil);
            mBrana.position.set(nastepX, nastepY + 1.5, 0);
            scena.add(mBrana);
            urovenObjekty.push(mBrana);
            aktualniLevelData.cil = { x: nastepX, y: nastepY, w: 1.5, h: 3 };
        }

        // ================= SYNC MULTIPLAYERU (SUPABASE) =================
        async function startEngine() {
            init3D();
            
            // Mobilní vs PC detekce
            isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'flex';
                const bindTouch = (id, klic) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); touchStav[klic] = true; });
                    el.addEventListener('touchend', (e) => { e.preventDefault(); touchStav[klic] = false; });
                };
                bindTouch('btnLeft', 'left'); bindTouch('btnRight', 'right'); bindTouch('btnJump', 'jump');
            }

            window.addEventListener('keydown', e => klavesy[e.code] = true);
            window.addEventListener('keyup', e => klavesy[e.code] = false);

            sestav3DLevel(mujLevel);

            if (!sb) { document.getElementById('dynamicGameName').innerText = "3D Lokální Obby"; loop(); return; }

            // Načtení názvu hry
            const { data: gData } = await sb.from('games').select('name').ilike('url_path', '%obby-hra%').maybeSingle();
            let jmenoHry = gData ? gData.name : "3D Mega Obby";
            document.getElementById('dynamicGameName').innerText = jmenoHry;

            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                mojeId = user.id;
                mujUsername = user.user_metadata.display_name || user.email;
                await sb.from('online_players').update({ current_game: jmenoHry, updated_at: new Date().toISOString() }).eq('id', mojeId);

                mmoKanal = sb.channel('obby_3d_room', { config: { broadcast: { self: false } } });
                mmoKanal.on('broadcast', { event: 'tick' }, payload => {
                    const d = payload.payload;
                    
                    // Správa cizích avatarů v prostoru
                    if (!vzdaleniHraci[d.id]) {
                        const novy3DAvatar = vytvorHezkehoAvatara(d.color);
                        scena.add(novy3DAvatar);
                        vzdaleniHraci[d.id] = { obj: novy3DAvatar };
                    }
                    
                    const v = vzdaleniHraci[d.id];
                    v.username = d.username;
                    v.x = d.x; v.y = d.y; v.level = d.level;
                    v.rychlostX = d.rychlostX;
                    v.tickTime = Date.now();
                }).subscribe();

                // Síťový tik na server (30ms)
                setInterval(() => {
                    if (mmoKanal) {
                        mmoKanal.send({
                            type: 'broadcast', event: 'tick',
                            payload: { id: mojeId, username: mujUsername, x: hrac.x, y: hrac.y, color: mojeBarva, level: mujLevel, rychlostX: hrac.rychlostX }
                        });
                    }
                }, 30);
            }

            loop();
        }

        // ================= LOGICKÝ CYKLUS A 3D FYZIKA =================
        function loop() {
            requestAnimationFrame(loop);

            // Pohyby v ose X
            if (klavesy['ArrowRight'] || klavesy['KeyD'] || touchStav.right) {
                hrac.rychlostX = 0.15;
                lokalniKontejnerAvatar.rotation.y = Math.PI / 2; // Otočení avatara dopředu
            } else if (klavesy['ArrowLeft'] || klavesy['KeyA'] || touchStav.left) {
                hrac.rychlostX = -0.15;
                lokalniKontejnerAvatar.rotation.y = -Math.PI / 2; // Otočení avatara dozadu
            } else {
                hrac.rychlostX *= 0.8;
            }

            // Skok v ose Y
            if ((klavesy['ArrowUp'] || klavesy['Space'] || klavesy['KeyW'] || touchStav.jump) && !hrac.veVzduchu) {
                hrac.rychlostY = 4.2;
                hrac.veVzduchu = true;
            }

            hrac.rychlostY -= gravitace * 0.15;
            hrac.x += hrac.rychlostX;
            hrac.y += hrac.rychlostY;

            // --- DETEKCE KOLIZÍ VE 3D PROSTORU ---
            hrac.veVzduchu = true;
            aktualniLevelData.platformy.forEach(p => {
                if (hrac.x + hrac.sirka/2 > p.x - p.w/2 && hrac.x - hrac.sirka/2 < p.x + p.w/2) {
                    if (hrac.y >= p.y && hrac.y + hrac.rychlostY <= p.y + 0.2 && hrac.rychlostY <= 0) {
                        hrac.rychlostY = 0;
                        hrac.y = p.y;
                        hrac.veVzduchu = false;
                    }
                }
            });

            // Kolize s 3D lávou
            aktualniLevelData.lava.forEach(l => {
                if (hrac.x + hrac.sirka/2 > l.x - l.w/2 && hrac.x - hrac.sirka/2 < l.x + l.w/2) {
                    if (hrac.y <= l.y && hrac.y >= l.y - 0.8) restartHry();
                }
            });

            // Kolize s cílovou zelenou 3D bránou
            const c = aktualniLevelData.cil;
            if (hrac.x + hrac.sirka/2 > c.x - c.w/2 && hrac.x - hrac.sirka/2 < c.x + c.w/2) {
                if (hrac.y >= c.y && hrac.y <= c.y + c.h) {
                    if (mujLevel < 100) {
                        mujLevel++;
                        document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`;
                        sestav3DLevel(mujLevel);
                        restartHry();
                    } else {
                        alert("👑 Ovládl jsi celé 3D MMO Obby!");
                        mujLevel = 1; sestav3DLevel(mujLevel); restartHry();
                    }
                }
            }

            if (hrac.y < -8) restartHry();

            // Aktualizace pozice lokálního 3D avatara
            lokalniKontejnerAvatar.position.set(hrac.x, hrac.y, hrac.z);

            // --- ANIMACE AVATARA (BĚH) ---
            if (Math.abs(hrac.rychlostX) > 0.01 && !hrac.veVzduchu) {
                animacniCas += 0.2;
                lokalniKontejnerAvatar.userData.nohaL.rotation.z = Math.sin(animacniCas) * 0.6;
                lokalniKontejnerAvatar.userData.nohaP.rotation.z = -Math.sin(animacniCas) * 0.6;
                lokalniKontejnerAvatar.userData.rukaL.rotation.z = -Math.sin(animacniCas) * 0.4;
                lokalniKontejnerAvatar.userData.rukaP.rotation.z = Math.sin(animacniCas) * 0.4;
            } else {
                // Reset do klidové polohy
                lokalniKontejnerAvatar.userData.nohaL.rotation.z = 0;
                lokalniKontejnerAvatar.userData.nohaP.rotation.z = 0;
                lokalniKontejnerAvatar.userData.rukaL.rotation.z = 0;
                lokalniKontejnerAvatar.userData.rukaP.rotation.z = 0;
            }

            // Čisté filtrování multiplayeru podle čísel levelů
            const nyni = Date.now();
            for (let id in vzdaleniHraci) {
                const v = vzdaleniHraci[id];
                if (nyni - v.tickTime > 3000) {
                    scena.remove(v.obj);
                    delete vzdaleniHraci[id];
                    continue;
                }

                // TYPKA Z LEVELU 5 VIDÍŠ POUZE POKUD JSI NA LEVELU 5
                if (v.level === mujLevel) {
                    v.obj.visible = true;
                    v.obj.position.set(v.x, v.y, 0);
                    
                    // Animace pohybu cizího hráče
                    if (Math.abs(v.rychlostX) > 0.01) {
                        v.obj.rotation.y = v.rychlostX > 0 ? Math.PI / 2 : -Math.PI / 2;
                        v.obj.userData.nohaL.rotation.z = Math.sin(nyni * 0.01) * 0.6;
                        v.obj.userData.nohaP.rotation.z = -Math.sin(nyni * 0.01) * 0.6;
                    }
                } else {
                    v.obj.visible = false; // Úplná izolace v jiných levelech
                }
            }

            // Hladké sledování kamery za naší 3D postavou
            kamera.position.set(hrac.x, hrac.y + 3, hrac.z + 11);
            kamera.lookAt(hrac.x, hrac.y + 1, hrac.z);

            renderer.render(scena, kamera);
        }

        function restartHry() {
            hrac.x = 0; hrac.y = 4; hrac.rychlostX = 0; hrac.rychlostY = 0;
        }

        function onWindowResize() {
            kamera.aspect = window.innerWidth / window.innerHeight;
            kamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function vratSeDoLobby() {
            if (sb && mojeId) {
                await sb.from('online_players').update({ current_game: 'Lobby', updated_at: new Date().toISOString() }).eq('id', mojeId);
            }
            window.location.href = '../index.html';
        }

        startEngine();
    </script>
</body>
</html>
