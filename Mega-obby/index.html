<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Fixed Multiplayer Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1c23; font-family: 'Inter', sans-serif; }

        #gameCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; }

        #gameHeader {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(to bottom, rgba(26,28,35,0.9), rgba(26,28,35,0));
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; color: #fff; pointer-events: auto; }
        .brand-name { font-weight: 900; font-size: 1.4rem; text-transform: uppercase; color: #00f0ff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .level-tag { background: #ff007f; color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; box-shadow: 0 4px 10px rgba(255,0,127,0.3); }

        .btn-leave {
            background: #ef4444; border: none; color: #fff; padding: 10px 20px; border-radius: 20px;
            cursor: pointer; font-weight: 700; font-size: 0.9rem; pointer-events: auto; text-decoration: none;
            transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 10px rgba(239,68,68,0.3);
        }
        .btn-leave:hover { background: #dc2626; transform: scale(1.05); }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: white; border-radius: 50%;
            z-index: 5; pointer-events: none; display: none; border: 1px solid rgba(0,0,0,0.5);
        }

        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; background: rgba(26, 28, 35, 0.95); z-index: 100; cursor: pointer;
        }
        .start-card {
            background: #242731; border: 2px solid #2f3342;
            padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .start-card h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; color: #00ffcc; }
        .start-card p { color: #94a3b8; font-size: 1rem; }

        #mobileControls {
            position: absolute; bottom: 40px; left: 0; width: 100%; padding: 0 40px;
            display: none; justify-content: space-between; align-items: center; z-index: 50; pointer-events: none;
        }
        .move-container {
            width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; position: relative; pointer-events: auto; touch-action: none;
        }
        #joystickStick {
            width: 44px; height: 44px; background: #00f0ff; border-radius: 50%;
            position: absolute; top: 31px; left: 31px; box-shadow: 0 4px 10px rgba(0,240,255,0.4);
        }
        .action-container { pointer-events: auto; }
        .btn-jump-mobile {
            width: 80px; height: 80px; background: #ff007f; border: none;
            border-radius: 50%; color: #fff; font-weight: 900; display: flex; justify-content: center; align-items: center; touch-action: none;
            box-shadow: 0 6px 15px rgba(255,0,127,0.4);
        }

        @media (hover: none) and (pointer: coarse) { #mobileControls { display: flex; } }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="brand-name">Netorikaraft</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="instructions">
        <div class="start-card" id="startCardBtn">
            <h2>SPUSTIT HRU</h2>
            <p>Klikni pro uzamčení myši. Chůze na platformách i skákání plně opraveno!</p>
        </div>
    </div>

    <div id="mobileControls">
        <div class="move-container" id="joystickZone">
            <div id="joystickStick"></div>
        </div>
        <div class="action-container">
            <div class="btn-jump-mobile" id="btnJumpMobile">JUMP</div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="gameCanvas"></div>

    <script>
        const SUPABASE_URL = "TVOJE_SUPABASE_URL";
        const SUPABASE_KEY = "TVŮJ_ANON_KEY";
        
        let sb = null; let mojeId = null; let mujUsername = "Hráč";
        let mujLevel = 1; let mmoKanal = null; let vzdaleniHraci = {};

        try {
            if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_URL.indexOf("TVOJE") === -1) {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.log("Supabase offline mód"); }

        let scena, kamera, renderer, lokalniKontejnerAvatar;
        let platformyFyzika = []; let lavaFyzika = []; let cilFyzika = null;
        let animacniCas = 0;

        const hrac = {
            pozice: new THREE.Vector3(0, 3, 0),
            rychlost: new THREE.Vector3(0, 0, 0),
            sirka: 0.8, vyska: 1.8, hloubka: 0.8, veVzduchu: true
        };

        const RYCHLOST_POHYBU = 0.15;
        const SILA_SKOKU = 0.21;
        const GRAVITACE = 0.009;

        const klavesy = {};
        let mobilniSmer = { x: 0, y: 0 };
        let mobilniSkok = false;
        let rotaceKamery = { yaw: 0, pitch: 0 };
        let isMobile = false;

        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function stringToHexColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let hue = Math.abs(hash % 360);
            return new THREE.Color(`hsl(${hue}, 85%, 55%)`);
        }

        function vytvorJmenovku(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 256, 64);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.roundRect(10, 10, 236, 44, 15);
            ctx.fill();
            
            ctx.font = 'bold 24px Inter, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);

            const textura = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: textura });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(2, 0.5, 1);
            sprite.position.y = 2.0;
            return sprite;
        }

        function init3D() {
            const container = document.getElementById('gameCanvas');
            scena = new THREE.Scene();
            scena.background = new THREE.Color(0x1a1c23); 
            scena.fog = new THREE.FogExp2(0x1a1c23, 0.015);

            kamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scena.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 15);
            scena.add(dirLight);

            isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            document.getElementById('startCardBtn').addEventListener('click', () => {
                if (!isMobile) container.requestPointerLock();
                else document.getElementById('instructions').style.display = 'none';
            });

            document.addEventListener('mousemove', pohniKamerouPC);
            if (isMobile) setupMobilniOvladani();

            lokalniKontejnerAvatar = vytvorKrasnehoAvatara(0x00f0ff);
            scena.add(lokalniKontejnerAvatar);

            window.addEventListener('keydown', e => { klavesy[e.code] = true; });
            window.addEventListener('keyup', e => { klavesy[e.code] = false; });
            window.addEventListener('resize', onWindowResize);

            document.addEventListener('pointerlockchange', () => {
                if (isMobile) return;
                if (document.pointerLockElement === container) {
                    document.getElementById('instructions').style.display = 'none';
                    document.getElementById('crosshair').style.display = 'block';
                } else {
                    document.getElementById('instructions').style.display = 'flex';
                    document.getElementById('crosshair').style.display = 'none';
                }
            });
        }

        function pohniKamerouPC(e) {
            if (document.pointerLockElement !== document.getElementById('gameCanvas')) return;
            rotaceKamery.yaw -= e.movementX * 0.0025;
            rotaceKamery.pitch -= e.movementY * 0.0025;
            rotaceKamery.pitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, rotaceKamery.pitch));
        }

        function setupMobilniOvladani() {
            const stick = document.getElementById('joystickStick');
            const zone = document.getElementById('joystickZone');
            let drag = false; let startX = 0, startY = 0;

            zone.addEventListener('touchstart', e => {
                drag = true; const t = e.touches[0]; startX = t.clientX; startY = t.clientY;
            });
            window.addEventListener('touchmove', e => {
                if (!drag) return;
                const t = e.touches[0]; let dx = t.clientX - startX; let dy = t.clientY - startY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                mobilniSmer.x = dx / 35; mobilniSmer.y = dy / 35;
            });
            window.addEventListener('touchend', () => {
                drag = false; stick.style.transform = 'translate(0px, 0px)'; mobilniSmer.x = 0; mobilniSmer.y = 0;
            });

            document.getElementById('btnJumpMobile').addEventListener('touchstart', e => { e.preventDefault(); mobilniSkok = true; });
            document.getElementById('btnJumpMobile').addEventListener('touchend', () => { mobilniSkok = false; });
        }

        function vytvorKrasnehoAvatara(barvaVstup) {
            const kontejner = new THREE.Group();
            
            const matObleceni = new THREE.MeshLambertMaterial({ color: barvaVstup });
            const matTelo = new THREE.MeshLambertMaterial({ color: 0x222530 });
            const matHlava = new THREE.MeshLambertMaterial({ color: 0xffdbac });
            const matOci = new THREE.MeshLambertMaterial({ color: 0x111111 });

            const mTelo = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.7, 12), matObleceni);
            mTelo.position.y = 0.85; kontejner.add(mTelo);
            
            const mHlava = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16), matHlava);
            mHlava.position.y = 1.35; kontejner.add(mHlava);

            const mOkoL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.05), matOci);
            mOkoL.position.set(-0.08, 1.38, 0.21); kontejner.add(mOkoL);
            const mOkoP = mOkoL.clone(); mOkoP.position.x = 0.08; kontejner.add(mOkoP);

            const geoNoha = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
            const mNohaL = new THREE.Mesh(geoNoha, matTelo);
            mNohaL.position.set(-0.16, 0.25, 0); kontejner.add(mNohaL);
            const mNohaP = mNohaL.clone(); mNohaP.position.x = 0.16; kontejner.add(mNohaP);

            const geoRuka = new THREE.CylinderGeometry(0.09, 0.09, 0.5, 8);
            const mRukaL = new THREE.Mesh(geoRuka, matObleceni);
            mRukaL.position.set(-0.45, 0.85, 0); mRukaL.rotation.z = 0.1; kontejner.add(mRukaL);
            const mRukaP = mRukaL.clone(); mRukaP.position.x = 0.45; mRukaP.rotation.z = -0.1; kontejner.add(mRukaP);

            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP, rukaL: mRukaL, rukaP: mRukaP };
            return kontejner;
        }

        function sestav3DLevel(levelCislo) {
            platformyFyzika.forEach(p => scena.remove(p.mesh));
            lavaFyzika.forEach(l => scena.remove(l.mesh));
            if(cilFyzika) scena.remove(cilFyzika.mesh);

            platformyFyzika = []; lavaFyzika = [];
            let seed = levelCislo * 777;

            const matStartovni = new THREE.MeshLambertMaterial({ color: 0x3b82f6 }); 
            const matLava = new THREE.MeshLambertMaterial({ color: 0xef4444 }); 
            const matCil = new THREE.MeshLambertMaterial({ color: 0x10b981 }); 

            vytvorStylizovanouKostku(0, -0.5, 0, 8, 1, 8, matStartovni, platformyFyzika);

            let akt = new THREE.Vector3(0, 0, -4);
            let pocetPrekazek = 7 + Math.floor(seededRandom(seed++) * 6); 

            for(let i=1; i<=pocetPrekazek; i++) {
                let s = 2.6 - (seededRandom(seed++) * 0.6);
                akt.x += (seededRandom(seed++) - 0.5) * 7.0;
                akt.y += (seededRandom(seed++) - 0.3) * 1.2;
                akt.z -= 4.8 + (seededRandom(seed++) * 1.8);

                let barvaHue = ((levelCislo * 10) + (i * 15)) % 360;
                let matPlošina = new THREE.MeshLambertMaterial({ color: new THREE.Color(`hsl(${barvaHue}, 75%, 60%)`) });
                
                vytvorStylizovanouKostku(akt.x, akt.y - 0.2, akt.z, s, 0.4, s, matPlošina, platformyFyzika);

                if (seededRandom(seed++) > 0.65) {
                    vytvorStylizovanouKostku(akt.x, akt.y + 0.15, akt.z, s * 1.02, 0.3, 0.3, matLava, lavaFyzika);
                }
            }

            akt.z -= 5.5;
            vytvorStylizovanouKostku(akt.x, akt.y - 0.5, akt.z, 6, 1, 6, matCil, platformyFyzika);

            const mCil = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 0.3), matCil);
            mCil.position.set(akt.x, akt.y + 1.75, akt.z);
            scena.add(mCil);
            cilFyzika = { mesh: mCil, min: new THREE.Vector3(akt.x-1.25, akt.y, akt.z-0.2), max: new THREE.Vector3(akt.x+1.25, akt.y+3.5, akt.z+0.2) };

            const nespodnaLava = new THREE.Mesh(new THREE.BoxGeometry(1000, 1, 1000), matLava);
            nespodnaLava.position.set(akt.x/2, -20, akt.z/2);
            scena.add(nespodnaLava);
            lavaFyzika.push({ mesh: nespodnaLava, min: new THREE.Vector3(-500, -21, -500), max: new THREE.Vector3(500, -19, 500) });
        }

        function vytvorStylizovanouKostku(x, y, z, w, h, d, material, pole) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            scena.add(mesh);
            pole.push({ mesh, min: new THREE.Vector3(x - w/2, y - h/2, z - d/2), max: new THREE.Vector3(x + w/2, y + h/2, z + d/2) });
        }

        function kontrolaKolize(b1, b2) {
            return (b1.min.x <= b2.max.x && b1.max.x >= b2.min.x) && (b1.min.y <= b2.max.y && b1.max.y >= b2.min.y) && (b1.min.z <= b2.max.z && b1.max.z >= b2.min.z);
        }

        function ziskejHracBox(p) {
            return { min: new THREE.Vector3(p.x - hrac.sirka/2, p.y, p.z - hrac.hloubka/2), max: new THREE.Vector3(p.x + hrac.sirka/2, p.y + hrac.vyska, p.z + hrac.hloubka/2) };
        }

        function loop() {
            requestAnimationFrame(loop);

            let sVpred = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();
            let sStrana = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();

            let pX = 0; let pZ = 0;

            if (klavesy['KeyW'] || klavesy['ArrowUp']) { pX += sVpred.x; pZ += sVpred.z; }
            if (klavesy['KeyS'] || klavesy['ArrowDown']) { pX -= sVpred.x; pZ -= sVpred.z; }
            if (klavesy['KeyA'] || klavesy['ArrowLeft']) { pX -= sStrana.x; pZ -= sStrana.z; }
            if (klavesy['KeyD'] || klavesy['ArrowRight']) { pX += sStrana.x; pZ += sStrana.z; }

            if (isMobile && (Math.abs(mobilniSmer.x) > 0.01 || Math.abs(mobilniSmer.y) > 0.01)) {
                pX -= sVpred.x * mobilniSmer.y; pZ -= sVpred.z * mobilniSmer.y;
                pX += sStrana.x * mobilniSmer.x; pZ += sStrana.z * mobilniSmer.x;
            }

            // [OPRAVENO]: Rychlost se aplikuje bez ohledu na to, zda stojíme na zemi nebo letíme
            hrac.rychlost.x = pX * RYCHLOST_POHYBU;
            hrac.rychlost.z = pZ * RYCHLOST_POHYBU;

            if ((klavesy['Space'] || (isMobile && mobilniSkok)) && !hrac.veVzduchu) {
                hrac.rychlost.y = SILA_SKOKU; 
                hrac.veVzduchu = true;
            }
            hrac.rychlost.y -= GRAVITACE;

            // Pohyb a kolize na ose X
            hrac.pozice.x += hrac.rychlost.x;
            let hb = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hb, p)) { hrac.pozice.x -= hrac.rychlost.x; hrac.rychlost.x = 0; } });

            // Pohyb a kolize na ose Z
            hrac.pozice.z += hrac.rychlost.z;
            hb = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hb, p)) { hrac.pozice.z -= hrac.rychlost.z; hrac.rychlost.z = 0; } });

            // Pohyb a kolize na ose Y (Vertikální stabilita na plošinách)
            hrac.pozice.y += hrac.rychlost.y;
            hb = ziskejHracBox(hrac.pozice); 
            hrac.veVzduchu = true;
            
            platformyFyzika.forEach(p => {
                if (kontrolaKolize(hb, p)) {
                    if (hrac.rychlost.y <= 0) { 
                        hrac.pozice.y = p.max.y; 
                        hrac.rychlost.y = 0; 
                        hrac.veVzduchu = false; // Hráč bezpečně stojí na plošině a nespadne skrz ni
                    } else if (hrac.rychlost.y > 0) { 
                        hrac.pozice.y = p.min.y - hrac.vyska; 
                        hrac.rychlost.y = 0; 
                    }
                }
            });

            lavaFyzika.forEach(l => { if (kontrolaKolize(hb, l)) restartHry(); });
            
            if (cilFyzika && kontrolaKolize(hb, cilFyzika)) {
                mujLevel++;
                if(mujLevel > 100) mujLevel = 1;
                document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`;
                sestav3DLevel(mujLevel); 
                restartHry();
                aktualizovatLevelVDatabazi();
            }
            if (hrac.pozice.y < -18) restartHry();

            lokalniKontejnerAvatar.position.copy(hrac.pozice);
            
            // Animace chůze se spouští podle reálné vygenerované rychlosti
            if (Math.abs(hrac.rychlost.x) > 0.01 || Math.abs(hrac.rychlost.z) > 0.01) {
                lokalniKontejnerAvatar.rotation.y = Math.atan2(hrac.rychlost.x, hrac.rychlost.z);
                animacniCas += 0.22;
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = Math.sin(animacniCas) * 0.65;
                lokalniKontejnerAvatar.userData.nohaP.rotation.x = -Math.sin(animacniCas) * 0.65;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = -Math.sin(animacniCas) * 0.4;
                lokalniKontejnerAvatar.userData.rukaP.rotation.x = Math.sin(animacniCas) * 0.4;
            } else {
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = 0; lokalniKontejnerAvatar.userData.nohaP.rotation.x = 0;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = 0; lokalniKontejnerAvatar.userData.rukaP.rotation.x = 0;
            }

            const nyni = Date.now();
            for (let id in vzdaleniHraci) {
                const v = vzdaleniHraci[id];
                if (v.obj && nyni - v.tickTime < 3000 && v.level === mujLevel) {
                    v.obj.visible = true; 
                    v.obj.position.lerp(new THREE.Vector3(v.x, v.y, v.z), 0.25);
                } else if (v.obj) { 
                    v.obj.visible = false; 
                }
            }

            let kvaternionKamery = new THREE.Quaternion().setFromEuler(new THREE.Euler(rotaceKamery.pitch, rotaceKamery.yaw, 0, 'YXZ'));
            let vzdalenostKamery = new THREE.Vector3(0, 2.0, 5.0).applyQuaternion(kvaternionKamery);
            
            kamera.position.copy(hrac.pozice).add(vzdalenostKamery);
            kamera.lookAt(hrac.pozice.x, hrac.pozice.y + 1.0, hrac.pozice.z);

            renderer.render(scena, kamera);
        }

        function restartHry() { hrac.pozice.set(0, 2, 0); hrac.rychlost.set(0, 0, 0); hrac.veVzduchu = true; }
        function onWindowResize() { kamera.aspect = window.innerWidth / window.innerHeight; kamera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        async function aktualizovatLevelVDatabazi() {
            if (sb && mojeId) {
                await sb.from('online_players').upsert({
                    id: mojeId,
                    username: mujUsername,
                    current_game: 'Multiplayer OBBY - Lvl ' + mujLevel,
                    updated_at: new Date().toISOString()
                });
            }
        }

        async function startEngine() {
            init3D(); 
            sestav3DLevel(mujLevel);
            
            if (sb) {
                try {
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        mojeId = user.id; 
                        mujUsername = user.user_metadata.display_name || user.email || "Hráč";
                        
                        await aktualizovatLevelVDatabazi();

                        mmoKanal = sb.channel('roblox_final_room').on('broadcast', { event: 'tick' }, payload => {
                            const d = payload.payload;
                            if (d.id === mojeId) return;

                            if (!vzdaleniHraci[d.id]) {
                                let unikatniBarva = stringToHexColor(d.id);
                                const av = vytvorKrasnehoAvatara(unikatniBarva);
                                
                                let jmenovka = vytvorJmenovku(d.username || "Hráč");
                                av.add(jmenovka);

                                scena.add(av); 
                                vzdaleniHraci[d.id] = { obj: av, x: d.x, y: d.y, z: d.z };
                            }
                            const v = vzdaleniHraci[d.id];
                            v.x = d.x; v.y = d.y; v.z = d.z; v.level = d.level; v.tickTime = Date.now();
                        }).subscribe();

                        setInterval(() => {
                            if(mmoKanal) mmoKanal.send({ type: 'broadcast', event: 'tick', payload: { id: mojeId, username: mujUsername, x: hrac.pozice.x, y: hrac.pozice.y, z: hrac.pozice.z, level: mujLevel } });
                        }, 30);
                    }
                } catch(e) { console.error("Chyba Supabase:", e); }
            }
            loop();
        }

        async function vratSeDoLobby() {
            if (sb && mojeId) {
                try { await sb.from('online_players').delete().eq('id', mojeId); } catch(e) {}
            }
            window.location.href = '../index.html';
        }

        window.addEventListener('beforeunload', () => {
            if (sb && mojeId) { sb.from('online_players').delete().eq('id', mojeId); }
        });

        window.onload = startEngine;
    </script>
</body>
</html>
