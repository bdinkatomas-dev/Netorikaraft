<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Next-Gen Roblox Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

    <style>
        :root {
            --bg-nav: rgba(10, 12, 16, 0.6);
            --accent: #3b82f6;
            --text-main: #ffffff;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; font-family: 'Inter', sans-serif; }

        #gameCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; }

        /* MODERNÍ ROBLOX HUD */
        #gameHeader {
            position: absolute; top: 0; left: 0; width: 100%; padding: 16px 32px;
            background: linear-gradient(to bottom, rgba(10,12,16,0.8), rgba(10,12,16,0));
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .brand-zone { display: flex; align-items: center; gap: 16px; color: var(--text-main); pointer-events: auto; }
        .brand-name { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; text-transform: uppercase; background: linear-gradient(45deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .game-tag { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px); }
        .level-tag { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #34d399; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px); }

        .btn-leave {
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; padding: 8px 20px; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 0.85rem; pointer-events: auto; backdrop-filter: blur(4px); transition: all 0.2s;
        }
        .btn-leave:hover { background: rgba(239, 68, 68, 0.4); transform: scale(1.05); }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: rgba(255,255,255,0.7); border-radius: 50%;
            z-index: 5; pointer-events: none; display: none; box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; background: radial-gradient(circle, rgba(15,23,42,0.85) 0%, rgba(10,12,16,0.95) 100%);
            z-index: 100; cursor: pointer; backdrop-filter: blur(12px); transition: opacity 0.4s;
        }
        .start-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 40px 60px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .start-card h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 15px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .start-card p { color: #94a3b8; font-size: 1rem; line-height: 1.6; }
        .start-card .click-prompt { margin-top: 25px; color: #3b82f6; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="brand-name">Netorikaraft RTX</span>
            <span class="game-tag" id="dynamicGameName">Roblox Ultra Obby</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="instructions" onclick="zamkniMys()">
        <div class="start-card">
            <h2>SPUSTIT HRU</h2>
            <p>Pohyb: <b>W, A, S, D</b> nebo <b>Šipky</b><br>Skok: <b>Mezerník</b><br>Rozhlížení: <b>Pohyb myší</b></p>
            <div class="click-prompt">Klikni kamkoliv pro vstup do světa</div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="gameCanvas"></div>

    <script>
        const SUPABASE_URL = "TVOJE_SUPABASE_URL";
        const SUPABASE_KEY = "TVŮJ_ANON_KEY";
        
        let sb = null; let mojeId = null; let mujUsername = "Hráč";
        let mojeBarvaHex = "#" + Math.floor(Math.random()*16777215).toString(16);
        let mujLevel = 1; let mmoKanal = null; let vzdaleniHraci = {};

        try {
            if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_URL !== "TVOJE_SUPABASE_URL") {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.error(e); }

        let scena, kamera, renderer, lokalniKontejnerAvatar;
        let platformyFyzika = []; let lavaFyzika = []; let cilFyzika = null;
        let animacniCas = 0;

        const hrac = {
            pozice: new THREE.Vector3(0, 3, 0),
            rychlost: new THREE.Vector3(0, 0, 0),
            sirka: 0.8, vyska: 1.8, hloubka: 0.8, veVzduchu: true
        };

        const RYCHLOST_POHYBU = 0.14;
        const SILA_SKOKU = 0.23;
        const GRAVITACE = 0.0095;

        const klavesy = {};
        let rotaceKamery = { yaw: 0, pitch: 0 };

        // 1. INICIALIZACE ULTRA GRAFIKY V THREE.JS
        function init3D() {
            const container = document.getElementById('gameCanvas');
            scena = new THREE.Scene();
            
            // Roblox styl mlhy (Hloubka ostrosti, která maskuje okraje herního světa)
            scena.background = new THREE.Color(0x111622);
            scena.fog = new THREE.FogExp2(0x111622, 0.018);

            kamera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Nastavení vykreslovacího jádra na maximální kvalitu
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Hlídání ostrosti hran
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Nádherné měkké stíny
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Filmové barvy a kontrast jako v AAA hrách
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // GLOBÁLNÍ GENERÁTOR NEBESKÉHO GRADIENTU (Nádherná obloha místo černé díry)
            vytvorSkybox();

            // OSVĚTLENÍ (Kombinace okolního světla pro stíny a ostrého slunce pro lesk)
            const ambientniSvetlo = new THREE.AmbientLight(0xffffff, 0.4);
            scena.add(ambientniSvetlo);

            // Druhotné modravé světlo simulující odraz oblohy
            const svetloOblohy = new THREE.HemisphereLight(0x7dd3fc, 0x111622, 0.4);
            scena.add(svetloOblohy);

            const slunce = new THREE.DirectionalLight(0xfffbeb, 1.2);
            slunce.position.set(30, 60, 20);
            slunce.castShadow = true;
            
            // Precizní nastavení stínové mapy
            slunce.shadow.mapSize.width = 2048;
            slunce.shadow.mapSize.height = 2048;
            slunce.shadow.camera.near = 0.5;
            slunce.shadow.camera.far = 150;
            const d = 40;
            slunce.shadow.camera.left = -d; slunce.shadow.camera.right = d;
            slunce.shadow.camera.top = d; slunce.shadow.camera.bottom = -d;
            slunce.shadow.bias = -0.0005;
            scena.add(slunce);

            // Vytvoření prémiového avatara
            lokalniKontejnerAvatar = vytvorHezkehoAvatara(parseInt(mojeBarvaHex.replace("#", "0x")));
            scena.add(lokalniKontejnerAvatar);

            window.addEventListener('keydown', e => { klavesy[e.code] = true; });
            window.addEventListener('keyup', e => { klavesy[e.code] = false; });
            document.addEventListener('mousemove', pohniKamerou);
            window.addEventListener('resize', onWindowResize);

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === container) {
                    document.getElementById('instructions').style.opacity = '0';
                    setTimeout(() => document.getElementById('instructions').style.display = 'none', 400);
                    document.getElementById('crosshair').style.display = 'block';
                } else {
                    document.getElementById('instructions').style.display = 'flex';
                    setTimeout(() => document.getElementById('instructions').style.opacity = '1', 10);
                    document.getElementById('crosshair').style.display = 'none';
                }
            });
        }

        function zamkniMys() { document.getElementById('gameCanvas').requestPointerLock(); }

        function pohniKamerou(e) {
            if (document.pointerLockElement !== document.getElementById('gameCanvas')) return;
            rotaceKamery.yaw -= e.movementX * 0.0022;
            rotaceKamery.pitch -= e.movementY * 0.0022;
            rotaceKamery.pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, rotaceKamery.pitch));
        }

        function vytvorSkybox() {
            const geoObloha = new THREE.SphereGeometry(500, 32, 15);
            const matObloha = new THREE.MeshBasicMaterial({
                color: 0x1b2336,
                side: THREE.BackSide
            });
            const mObloha = new THREE.Mesh(geoObloha, matObloha);
            scena.add(mObloha);
        }

        // 2. TVORBA AVATARA S JEMNÝMI DETAILY (Vylepšené materiály s leskem)
        function vytvorHezkehoAvatara(barvaHex) {
            const kontejner = new THREE.Group();
            
            // Používáme Standardní materiály s odrazem světla
            const matTelo = new THREE.MeshStandardMaterial({ color: barvaHex, roughness: 0.1, metalness: 0.1 });
            const matKuzg = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.5 });
            const matObleceni = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.7 });

            // Trup (Zaoblenější vzhled díky zkosení hran vyřešíme vrstvením)
            const mTelo = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.95, 0.4), matTelo);
            mTelo.position.y = 0.87; mTelo.castShadow = true; mTelo.receiveShadow = true;
            kontejner.add(mTelo);
            
            // Hlava s čepicí
            const mHlava = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.48, 0.48), matKuzg);
            mHlava.position.y = 1.63; mHlava.castShadow = true;
            kontejner.add(mHlava);

            const mSluchatka = new THREE.Mesh(new THREE.BoxGeometry(0.54, 0.15, 0.54), matObleceni);
            mSluchatka.position.y = 1.85; mSluchatka.castShadow = true;
            kontejner.add(mSluchatka);

            // Nohy
            const mNohaL = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.4, 0.26), matObleceni);
            mNohaL.position.set(-0.18, 0.2, 0); mNohaL.castShadow = true;
            kontejner.add(mNohaL);
            
            const mNohaP = mNohaL.clone(); mNohaP.position.x = 0.18;
            kontejner.add(mNohaP);

            // Ruce (Roblox style oddělené končetiny)
            const mRukaL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.8, 0.22), matTelo);
            mRukaL.position.set(-0.52, 0.85, 0); mRukaL.castShadow = true;
            kontejner.add(mRukaL);

            const mRukaP = mRukaL.clone(); mRukaP.position.x = 0.52;
            kontejner.add(mRukaP);

            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP, rukaL: mRukaL, rukaP: mRukaP };
            return kontejner;
        }

        // 3. GENERÁTOR ESTETICKÝCH PLATFOREM (Zářící neonové hrany, hladké povrchy)
        function sestav3DLevel(n) {
            platformyFyzika.forEach(p => scena.remove(p.mesh));
            lavaFyzika.forEach(l => scena.remove(l.mesh));
            if(cilFyzika) scena.remove(cilFyzika.mesh);

            platformyFyzika = []; lavaFyzika = [];

            // Luxusní herní materiály (Neonové záření a plastový Roblox povrch)
            const matP = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.2, metalness: 0.1 });
            const matL = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.1, emissive: 0xef4444, emissiveIntensity: 1.5 }); // Skutečně svítící láva!
            const matC = new THREE.MeshStandardMaterial({ color: 0x06b6d4, roughness: 0.05, emissive: 0x06b6d4, emissiveIntensity: 0.8, transparent: true, opacity: 0.7 });

            // Startovní zóna
            vytvorKostku(0, -1, 0, 7, 2, 7, matP, platformyFyzika);

            let akt = new THREE.Vector3(0, 0, -4);
            const pocetSkoku = 8;

            for(let i=1; i<=pocetSkoku; i++) {
                let sirka = Math.max(1.6, 3.4 - (n * 0.015));
                let hloubka = Math.max(1.6, 3.4 - (n * 0.015));
                
                // Trasa kličkuje v prostoru do všech směrů
                akt.x += Math.sin(i * 1.5 + n) * 4.0;
                akt.y += Math.cos(i) * 0.5;
                akt.z -= 5.0;

                // Vygenerování plošinky
                vytvorKostku(akt.x, akt.y - 0.3, akt.z, sirka, 0.6, hloubka, matP, platformyFyzika);

                // Přidání překážek (Rotující kužely/kostky nahradíme přesnými zářícími lasery)
                if (n >= 3 && i % 2 === 0) {
                    vytvorKostku(akt.x, akt.y + 0.15, akt.z, sirka * 1.05, 0.3, 0.3, matL, lavaFyzika);
                }
            }

            // Cílový ostrov
            akt.z -= 5.5;
            vytvorKostku(akt.x, akt.y - 1, akt.z, 6, 2, 6, matP, platformyFyzika);

            // Svítící cílová brána (Brána do dalšího levelu)
            const gCil = new THREE.BoxGeometry(2.5, 3.5, 0.4);
            const mCil = new THREE.Mesh(gCil, matC);
            mCil.position.set(akt.x, akt.y + 1.75, akt.z);
            scena.add(mCil);
            cilFyzika = { mesh: mCil, min: new THREE.Vector3(akt.x-1.25, akt.y, akt.z-0.2), max: new THREE.Vector3(akt.x+1.25, akt.y+3.5, akt.z+0.2) };

            // Smrtící podlaha hluboko pod mapou (Obří oceán lávy)
            vytvorKostku(akt.x / 2, -18, akt.z / 2, 400, 1, 400, matL, lavaFyzika);
        }

        function vytvorKostku(x, y, z, w, h, d, material, pole) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            scena.add(mesh);

            pole.push({
                mesh: mesh,
                min: new THREE.Vector3(x - w/2, y - h/2, z - d/2),
                max: new THREE.Vector3(x + w/2, y + h/2, z + d/2)
            });
        }

        // 4. CHYTRÁ 3D MULTI-OSÁ FYZIKA (100% stabilita proti propadům)
        function kontrolaKolize(box1, box2) {
            return (box1.min.x <= box2.max.x && box1.max.x >= box2.min.x) &&
                   (box1.min.y <= box2.max.y && box1.max.y >= box2.min.y) &&
                   (box1.min.z <= box2.max.z && box1.max.z >= box2.min.z);
        }

        function ziskejHracBox(pozice) {
            return {
                min: new THREE.Vector3(pozice.x - hrac.sirka/2, pozice.y, pozice.z - hrac.hloubka/2),
                max: new THREE.Vector3(pozice.x + hrac.sirka/2, pozice.y + hrac.vyska, pozice.z + hrac.hloubka/2)
            };
        }

        async function startEngine() {
            init3D();
            sestav3DLevel(mujLevel);

            if (sb) {
                try {
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        mojeId = user.id; mujUsername = user.user_metadata.display_name || user.email;
                        const { data: gData } = await sb.from('games').select('name').ilike('url_path', '%obby-hra%').maybeSingle();
                        let jmenoHry = gData ? gData.name : "Roblox Ultra Obby";
                        document.getElementById('dynamicGameName').innerText = jmenoHry;

                        await sb.from('online_players').update({ current_game: jmenoHry, updated_at: new Date().toISOString() }).eq('id', mojeId);

                        mmoKanal = sb.channel('roblox_rtx_room').on('broadcast', { event: 'tick' }, payload => {
                            const d = payload.payload;
                            if (!vzdaleniHraci[d.id]) {
                                const av = vytvorHezkehoAvatara(parseInt(d.color.replace("#", "0x")));
                                scena.add(av); vzdaleniHraci[d.id] = { obj: av };
                            }
                            const v = vzdaleniHraci[d.id];
                            v.username = d.username; v.x = d.x; v.y = d.y; v.z = d.z; v.level = d.level; v.tickTime = Date.now();
                        }).subscribe();

                        setInterval(() => {
                            if(mmoKanal) mmoKanal.send({ type: 'broadcast', event: 'tick', payload: { id: mojeId, username: mujUsername, x: hrac.pozice.x, y: hrac.pozice.y, z: hrac.pozice.z, color: mojeBarvaHex, level: mujLevel } });
                        }, 30);
                    }
                } catch(e) { console.error(e); }
            }
            loop();
        }

        // 5. POHYBOVÁ SMYČKA A PLYNULÉ ANIMACE KONČETIN
        function loop() {
            requestAnimationFrame(loop);

            let smerVpred = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();
            let smerStrana = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();

            let cRychlostX = 0; let cRychlostZ = 0;

            if (klavesy['KeyW'] || klavesy['ArrowUp']) { cRychlostX += smerVpred.x * RYCHLOST_POHYBU; cRychlostZ += smerVpred.z * RYCHLOST_POHYBU; }
            if (klavesy['KeyS'] || klavesy['ArrowDown']) { cRychlostX -= smerVpred.x * RYCHLOST_POHYBU; cRychlostZ -= smerVpred.z * RYCHLOST_POHYBU; }
            if (klavesy['KeyA'] || klavesy['ArrowLeft']) { cRychlostX -= smerStrana.x * RYCHLOST_POHYBU; cRychlostZ -= smerStrana.z * RYCHLOST_POHYBU; }
            if (klavesy['KeyD'] || klavesy['ArrowRight']) { cRychlostX += smerStrana.x * RYCHLOST_POHYBU; cRychlostZ += smerStrana.z * RYCHLOST_POHYBU; }

            hrac.rychlost.x = cRychlostX; hrac.rychlost.z = cRychlostZ;

            if (klavesy['Space'] && !hrac.veVzduchu) { hrac.rychlost.y = SILA_SKOKU; hrac.veVzduchu = true; }
            hrac.rychlost.y -= GRAVITACE;

            // Fyzikální posuny s okamžitou korekcí narážení (AABB)
            hrac.pozice.x += hrac.rychlost.x;
            let hracBox = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hracBox, p)) { hrac.pozice.x -= hrac.rychlost.x; hrac.rychlost.x = 0; } });

            hrac.pozice.z += hrac.rychlost.z;
            hracBox = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hracBox, p)) { hrac.pozice.z -= hrac.rychlost.z; hrac.rychlost.z = 0; } });

            hrac.pozice.y += hrac.rychlost.y;
            hracBox = ziskejHracBox(hrac.pozice); hrac.veVzduchu = true;
            platformyFyzika.forEach(p => {
                if (kontrolaKolize(hracBox, p)) {
                    if (hrac.rychlost.y < 0) { hrac.pozice.y = p.max.y; hrac.rychlost.y = 0; hrac.veVzduchu = false; }
                    else if (hrac.rychlost.y > 0) { hrac.pozice.y = p.min.y - hrac.vyska; hrac.rychlost.y = 0; }
                }
            });

            // Smrt a Cíl
            lavaFyzika.forEach(l => { if (kontrolaKolize(hracBox, l)) restartHry(); });
            if (cilFyzika && kontrolaKolize(hracBox, cilFyzika)) {
                if (mujLevel < 100) {
                    mujLevel++; document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`;
                    sestav3DLevel(mujLevel); restartHry();
                } else { alert("👑 VYHRÁL JSI CELOU HRU!"); mujLevel = 1; sestav3DLevel(mujLevel); restartHry(); }
            }
            if (hrac.pozice.y < -15) restartHry();

            // PŘEVOD POZIC NA MODEL + PRÉMIOVÉ ANIMACE
            lokalniKontejnerAvatar.position.copy(hrac.pozice);
            
            if (Math.abs(hrac.rychlost.x) > 0.01 || Math.abs(hrac.rychlost.z) > 0.01) {
                // Hladké otáčení postavy do směru běhu
                let uhel = Math.atan2(hrac.rychlost.x, hrac.rychlost.z);
                lokalniKontejnerAvatar.rotation.y = uhel;

                animacniCas += 0.24;
                // Protiběžný pohyb nohou a rukou jako v reálném Robloxu
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = Math.sin(animacniCas) * 0.65;
                lokalniKontejnerAvatar.userData.nohaP.rotation.x = -Math.sin(animacniCas) * 0.65;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = -Math.sin(animacniCas) * 0.5;
                lokalniKontejnerAvatar.userData.rukaP.rotation.x = Math.sin(animacniCas) * 0.5;
            } else {
                // Navrácení do klidového stavu
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = 0; lokalniKontejnerAvatar.userData.nohaP.rotation.x = 0;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = 0; lokalniKontejnerAvatar.userData.rukaP.rotation.x = 0;
            }

            // Sync multiplayerových hráčů
            const nyni = Date.now();
            for (let id in vzdaleniHraci) {
                const v = vzdaleniHraci[id];
                if (v.obj) {
                    if (nyni - v.tickTime < 3000 && v.level === mujLevel) {
                        v.obj.visible = true; v.obj.position.set(v.x, v.y, v.z);
                    } else { v.obj.visible = false; }
                }
            }

            // 6. ROBLOX KAMERA Z 3. OSOBY S JEMNÝM SKLONEM
            let kvaternionKamery = new THREE.Quaternion().setFromEuler(new THREE.Euler(rotaceKamery.pitch, rotaceKamery.yaw, 0, 'YXZ'));
            let vzdálenostKamery = new THREE.Vector3(0, 2.0, 5.0).applyQuaternion(kvaternionKamery);
            
            kamera.position.copy(hrac.pozice).add(vzdálenostKamery);
            kamera.lookAt(hrac.pozice.x, hrac.pozice.y + 1.0, hrac.pozice.z);

            renderer.render(scena, kamera);
        }

        function restartHry() { hrac.pozice.set(0, 2, 0); hrac.rychlost.set(0, 0, 0); hrac.veVzduchu = true; }
        function onWindowResize() { kamera.aspect = window.innerWidth / window.innerHeight; kamera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        async function vratSeDoLobby() {
            if (sb && mojeId) { try { await sb.from('online_players').update({ current_game: 'Lobby' }).eq('id', mojeId); } catch(e){} }
            window.location.href = '../index.html';
        }

        window.onload = startEngine;
    </script>
</body>
</html>
