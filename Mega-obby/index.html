<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netorikaraft - Mega Obby</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050508;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            font-family: Arial, sans-serif;
        }
        .hud-text {
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud-text" id="levelDisplay">Level: 1 / 3</div>
        <div class="hud-text" style="color: #ff0055; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);" id="deathsDisplay">Smrti: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. SUPABASE PROPOJENÍ (Zápis stavu do Hubu) ---
        const SUPABASE_URL = "https://wkhzilhnxkrkyxtukkri.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraHppbGhueGtya3l4dHVra3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTk2NDgsImV4cCI6MjA5NjkzNTY0OH0.Wye7-3_fhjvE4dy2vGML1FNZi_Vx3DGkynbBUHkeC-4";
        
        let sb = null;
        try {
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) { console.error(e); }

        async function posliHerniStavDoHubu() {
            if(!sb) return;
            const { data: { user }, error } = await sb.auth.getUser();
            if (user && !error) {
                await sb.from('online_players').upsert({
                    id: user.id,
                    username: user.user_metadata.display_name || user.email,
                    current_game: "Mega Obby", // Hub teď uvidí, že hraješ tuhle hru
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });
            }
        }
        posliHerniStavDoHubu();

        // --- 2. HERNÍ ENGINE (Lepší fyzika & Grafika) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Klávesnice
        const keys = { Left: false, Right: false, Up: false };
        window.addEventListener("keydown", (e) => {
            if(e.code === "ArrowLeft" || e.code === "KeyA") keys.Left = true;
            if(e.code === "ArrowRight" || e.code === "KeyD") keys.Right = true;
            if(e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.Up = true;
        });
        window.addEventListener("keyup", (e) => {
            if(e.code === "ArrowLeft" || e.code === "KeyA") keys.Left = false;
            if(e.code === "ArrowRight" || e.code === "KeyD") keys.Right = false;
            if(e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.Up = false;
        });

        // Stav Hráče
        const player = {
            x: 100, y: 400,
            vx: 0, vy: 0,
            width: 24, height: 24,
            speed: 0.8, maxVx: 6, friction: 0.85,
            gravity: 0.5, jumpForce: -11,
            grounded: false,
            deaths: 0,
            color: "#00f0ff"
        };

        let currentLevel = 0;
        let checkpoint = { x: 100, y: 400 };

        // Částice (pro hezčí efekty při skoku a smrti)
        let particles = [];
        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        // --- DEFINICE LEVELŮ (Design překážek) ---
        // Typy: 'block' (pevný), 'lava' (smrtící), 'checkpoint' (uložení), 'finish' (další level)
        const levels = [
            // Level 1: Úvodní skákačka
            [
                { x: 0, y: 500, w: 300, h: 100, type: 'block', color: '#161925' },
                { x: 420, y: 460, w: 120, h: 20, type: 'block', color: '#161925' },
                { x: 620, y: 400, w: 100, h: 20, type: 'block', color: '#161925' },
                { x: 780, y: 450, w: 80, h: 20, type: 'lava', color: '#ff0055' }, // Past uprostřed
                { x: 920, y: 380, w: 200, h: 200, type: 'block', color: '#161925' },
                { x: 950, y: 350, w: 40, h: 30, type: 'checkpoint', color: '#00ff66' },
                { x: 1250, y: 320, w: 100, h: 20, type: 'block', color: '#161925' },
                { x: 1450, y: 260, w: 150, h: 300, type: 'finish', color: '#ffaa00' }
            ],
            // Level 2: Pohyblivé plošiny a lasery
            [
                { x: 0, y: 400, w: 200, h: 200, type: 'block', color: '#161925' },
                { x: 300, y: 350, w: 100, h: 20, type: 'block', color: '#161925', moveX: 100, speed: 0.02, startX: 300 }, // Pohyblivá plošina
                { x: 550, y: 300, w: 120, h: 20, type: 'block', color: '#161925', moveY: 80, speed: 0.03, startY: 300 },  // Pohyblivá nahoru/dolu
                { x: 750, y: 400, w: 150, h: 20, type: 'lava', color: '#ff0055' },
                { x: 950, y: 320, w: 200, h: 200, type: 'block', color: '#161925' },
                { x: 980, y: 290, w: 40, h: 30, type: 'checkpoint', color: '#00ff66' },
                { x: 1250, y: 250, w: 80, h: 20, type: 'block', color: '#161925' },
                { x: 1400, y: 200, w: 120, h: 500, type: 'finish', color: '#ffaa00' }
            ],
            // Level 3: Hardcore finále
            [
                { x: 0, y: 300, w: 150, h: 400, type: 'block', color: '#161925' },
                { x: 250, y: 350, w: 40, h: 40, type: 'lava', color: '#ff0055' },
                { x: 400, y: 250, w: 50, h: 20, type: 'block', color: '#161925' },
                { x: 550, y: 200, w: 30, h: 150, type: 'lava', color: '#ff0055' },
                { x: 700, y: 250, w: 60, h: 20, type: 'block', color: '#161925' },
                { x: 850, y: 350, w: 40, h: 40, type: 'lava', color: '#ff0055' },
                { x: 1000, y: 300, w: 250, h: 100, type: 'finish', color: '#ffaa00' }
            ]
        ];

        let camera = { x: 0, y: 0 };

        function restartAtCheckpoint() {
            player.x = checkpoint.x;
            player.y = checkpoint.y;
            player.vx = 0;
            player.vy = 0;
            createParticles(player.x + 12, player.y + 12, "#ff0055", 25);
            player.deaths++;
            document.getElementById("deathsDisplay").innerText = "Smrti: " + player.deaths;
        }

        function loadLevel(index) {
            if (index >= levels.length) {
                alert("Gratulace! Dokončil jsi celé Mega Obby!");
                currentLevel = 0;
                player.deaths = 0;
                document.getElementById("deathsDisplay").innerText = "Smrti: 0";
            } else {
                currentLevel = index;
            }
            document.getElementById("levelDisplay").innerText = `Level: ${currentLevel + 1} / ${levels.length}`;
            const platforms = levels[currentLevel];
            const startBlock = platforms[0];
            checkpoint = { x: startBlock.x + 20, y: startBlock.y - 40 };
            player.x = checkpoint.x;
            player.y = checkpoint.y;
            player.vx = 0; player.vy = 0;
        }

        loadLevel(0);

        // --- HLAVNÍ SMYČKA ---
        function update() {
            // Horizontální pohyb (Plynulé zrychlení a tření)
            if (keys.Left) { if (player.vx > -player.maxVx) player.vx -= player.speed; }
            if (keys.Right) { if (player.vx < player.maxVx) player.vx += player.speed; }
            player.vx *= player.friction;

            // Gravitace
            player.vy += player.gravity;

            // Skok
            if (keys.Up && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
                createParticles(player.x + player.width/2, player.y + player.height, "#00f0ff", 8);
            }

            player.grounded = false;

            // Aktualizace pozic pohyblivých plošin z aktuálního levelu
            const currentPlatforms = levels[currentLevel];
            currentPlatforms.forEach(p => {
                if (p.moveX) {
                    p.x = p.startX + Math.sin(Date.now() * p.speed) * p.moveX;
                }
                if (p.moveY) {
                    p.y = p.startY + Math.sin(Date.now() * p.speed) * p.moveY;
                }
            });

            // Detekce kolizí (osa X)
            player.x += player.vx;
            currentPlatforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (p.type === 'block') {
                        if (player.vx > 0) player.x = p.x - player.width;
                        if (player.vx < 0) player.x = p.x + p.w;
                    }
                    if (p.type === 'lava') restartAtCheckpoint();
                }
            });

            // Detekce kolizí (osa Y)
            player.y += player.vy;
            currentPlatforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (p.type === 'block') {
                        if (player.vy > 0) { 
                            player.y = p.y - player.height; 
                            player.vy = 0; 
                            player.grounded = true; 
                            // Pokud stojíme na pohybující se plošině, pohybujeme se s ní
                            if(p.moveX) player.x += Math.cos(Date.now() * p.speed) * p.moveX * p.speed;
                        }
                        else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
                    }
                    if (p.type === 'lava') restartAtCheckpoint();
                    if (p.type === 'checkpoint') {
                        checkpoint = { x: p.x + 10, y: p.y - 40 };
                        p.color = "#00ffcc"; // Změna barvy při aktivaci
                    }
                    if (p.type === 'finish') {
                        loadLevel(currentLevel + 1);
                    }
                }
            });

            // Pád do propasti
            if (player.y > canvas.height + 300) {
                restartAtCheckpoint();
            }

            // Kamera (Hladké sledování hráče - Lerp)
            camera.x += (player.x - canvas.width / 3 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

            // Aktualizace částic
            particles.forEach((pt, index) => {
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.alpha -= 0.02;
                if(pt.alpha <= 0) particles.splice(index, 1);
            });
        }

        // --- VYRENDROVÁNÍ GRAFIKY ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Mřížka na pozadí pro hloubku prostoru (Sci-Fi styl)
            ctx.strokeStyle = "#10121b";
            ctx.lineWidth = 1;
            const gridSize = 60;
            const startX = Math.floor(camera.x / gridSize) * gridSize;
            const startY = Math.floor(camera.y / gridSize) * gridSize;
            
            for (let x = startX; x < startX + canvas.width + gridSize; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x - camera.x, 0); ctx.lineTo(x - camera.x, canvas.height); ctx.stroke();
            }
            for (let y = startY; y < startY + canvas.height + gridSize; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y - camera.y); ctx.lineTo(canvas.width, y - camera.y); ctx.stroke();
            }

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Vykreslení plošin překážek
            levels[currentLevel].forEach(p => {
                ctx.shadowBlur = (p.type === 'lava' || p.type === 'finish' || p.type === 'checkpoint') ? 15 : 0;
                ctx.shadowColor = p.color;
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, p.type === 'block' ? 6 : 0);
                ctx.fill();
            });

            // Vykreslení částic
            ctx.shadowBlur = 10;
            particles.forEach(pt => {
                ctx.shadowColor = pt.color;
                ctx.fillStyle = pt.color;
                ctx.globalAlpha = pt.alpha;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1; // Reset opacity

            // Vykreslení Hráče s efektem svícení (Glow)
            ctx.shadowBlur = 18;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 6);
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
