<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Mega Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-nav: rgba(22, 25, 32, 0.9);
            --accent: #3b82f6;
            --text-main: #f3f4f6;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0; padding: 0;
        }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0e12;
            font-family: 'Inter', sans-serif;
        }

        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
            z-index: 1;
        }

        #fallbackCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            z-index: 2;
            background: #0d0e12;
        }

        #gameHeader {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 12px 24px;
            background: var(--bg-nav);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .logo-icon { font-size: 1.4rem; }
        .brand-name { font-weight: 700; font-size: 1.1rem; }
        .game-tag { background: #202430; color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .level-tag { background: #10b981; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }

        .btn-leave {
            background: var(--danger); color: white; border: none;
            padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-leave:hover { background: var(--danger-hover); }

        #mobileControls {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            padding: 0 40px;
            display: none; 
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .move-btns { display: flex; gap: 24px; pointer-events: auto; }
        .action-btns { pointer-events: auto; }

        .joy-btn {
            width: 75px; height: 75px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; color: white; font-size: 2rem;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px); touch-action: none;
        }
        .joy-btn:active { background: rgba(59, 130, 246, 0.6); border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="logo-icon">🎮</span>
            <span class="brand-name">Netorikaraft</span>
            <span class="game-tag" id="dynamicGameName">Mega Obby</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="gameCanvas"></div>
    <canvas id="fallbackCanvas"></canvas>

    <div id="mobileControls">
        <div class="move-btns">
            <div class="joy-btn" id="btnLeft">◀</div>
            <div class="joy-btn" id="btnRight">▶</div>
        </div>
        <div class="action-btns">
            <div class="joy-btn" id="btnJump" style="width: 90px; height: 90px; font-size: 1.2rem; font-weight: bold;">JUMP</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "TVOJE_SUPABASE_URL";
        const SUPABASE_KEY = "TVŮJ_ANON_KEY";
        
        let sb = null;
        let mojeId = null;
        let mujUsername = "Hráč";
        let mojeBarvaHex = "#" + Math.floor(Math.random()*16777215).toString(16);
        let mujLevel = 1;
        let mmoKanal = null;
        let vzdaleniHraci = {};

        let pouzit2DFallback = false;
        const canvas2D = document.getElementById('fallbackCanvas');
        const ctx2D = canvas2D.getContext('2d');

        try {
            if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_URL !== "TVOJE_SUPABASE_URL") {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) {}

        let scena, kamera, renderer, lokalniKontejnerAvatar;
        let urovenObjekty = [];
        let animacniCas = 0;

        // Fyzikální model sjednocený pro obě zobrazení
        const hrac = {
            x: 60, y: 350, sirka: 26, vyska: 26,
            rychlostX: 0, rychlostY: 0, veVzduchu: false
        };

        const gravitace = 0.5;
        const treni = 0.8;
        const klavesy = {};
        let isMobile = false;
        const touchStav = { left: false, right: false, jump: false };

        // DETEKCE PODPORY 3D GRAPHICS (WEBGL)
        function detekujWebGL() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch (e) { return false; }
        }

        function init3D() {
            const container = document.getElementById('gameCanvas');
            scena = new THREE.Scene();
            scena.background = new THREE.Color(0x0d0e12);
            kamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            scena.add(new THREE.AmbientLight(0xffffff, 0.8));
            lokalniKontejnerAvatar = vytvorHezkehoAvatara(parseInt(mojeBarvaHex.replace("#", "0x")));
            scena.add(lokalniKontejnerAvatar);
        }

        function vytvorHezkehoAvatara(barvaHex) {
            const kontejner = new THREE.Group();
            const matTelo = new THREE.MeshBasicMaterial({ color: barvaHex });
            const matKuzg = new THREE.MeshBasicMaterial({ color: 0xffdbac });
            
            const mTelo = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.1, 0.5), matTelo);
            mTelo.position.y = 1.05; kontejner.add(mTelo);
            
            const mHlava = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), matKuzg);
            mHlava.position.y = 1.9; kontejner.add(mHlava);

            const mNohaL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), new THREE.MeshBasicMaterial({ color: 0x1f2937 }));
            mNohaL.position.set(-0.22, 0.25, 0); kontejner.add(mNohaL);
            const mNohaP = mNohaL.clone(); mNohaP.position.x = 0.22; kontejner.add(mNohaP);

            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP };
            return kontejner;
        }

        // UNIVERZÁLNÍ GENERÁTOR TRASY (Využívají ho obě grafiky stejně)
        function vygenerujLevelData(n) {
            let platformy = [{ x: 0, y: 480, w: 140, h: 120 }];
            let lava = [{ x: 140, y: 585, w: 920, h: 15 }];
            const pocetSkoku = 6;
            let aktX = 170; let aktY = 460;

            for (let i = 1; i <= pocetSkoku; i++) {
                const sirkaPlat = Math.max(45, 90 - (n * 0.4));
                const rozestupX = 115 + ((Math.sin(n * i + i) + 1) * 12);
                aktY += (Math.cos(n * i + 3) * 35);

                if (aktY > 500) aktY = 490;
                if (aktY < 230) aktY = 260;

                platformy.push({ x: aktX, y: aktY, w: sirkaPlat, h: 16 });

                if (n >= 10 && (n + i) % 3 === 0) {
                    lava.push({ x: aktX + (sirkaPlat / 3), y: aktY - 6, w: sirkaPlat / 3, h: 6 });
                }
                aktX += sirkaPlat + rozestupX;
            }
            platformy.push({ x: 1060, y: 440, w: 140, h: 160 });
            return { platformy, lava, cil: { x: 1110, y: 370, w: 40, h: 70 } };
        }

        function sestav3DLevel(n) {
            if (pouzit2DFallback) return;
            urovenObjekty.forEach(obj => scena.remove(obj));
            urovenObjekty = [];
            const data = vygenerujLevelData(n);

            const matP = new THREE.MeshBasicMaterial({ color: 0x252b36 });
            const matL = new THREE.MeshBasicMaterial({ color: 0xef4444 });

            data.platformy.forEach(p => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(p.w / 10, p.h / 10, 3), matP);
                mesh.position.set(p.x / 10, (600 - p.y) / 10, 0);
                scena.add(mesh); urovenObjekty.push(mesh);
            });
            data.lava.forEach(l => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(l.w / 10, l.h / 10, 3), matL);
                mesh.position.set(l.x / 10, (600 - l.y) / 10, 0);
                scena.add(mesh); urovenObjekty.push(mesh);
            });
            const meshC = new THREE.Mesh(new THREE.BoxGeometry(data.cil.w / 10, data.cil.h / 10, 2), new THREE.MeshBasicMaterial({ color: 0x10b981 }));
            meshC.position.set(data.cil.x / 10, (600 - data.cil.y) / 10, 0);
            scena.add(meshC); urovenObjekty.push(meshC);
        }

        async function startEngine() {
            // ROZHODNUTÍ: 3D NEBO BEZPEČNÉ 2D
            if (!detekujWebGL()) {
                pouzit2DFallback = true;
                document.getElementById('gameCanvas').style.display = 'none';
                canvas2D.style.display = 'block';
            } else {
                try { init3D(); } catch(e) {
                    pouzit2DFallback = true;
                    document.getElementById('gameCanvas').style.display = 'none';
                    canvas2D.style.display = 'block';
                }
            }

            isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'flex';
                const bindTouch = (id, klic) => {
                    const el = document.getElementById(id);
                    if(el){
                        el.addEventListener('touchstart', (e) => { e.preventDefault(); touchStav[klic] = true; });
                        el.addEventListener('touchend', (e) => { e.preventDefault(); touchStav[klic] = false; });
                    }
                };
                bindTouch('btnLeft', 'left'); bindTouch('btnRight', 'right'); bindTouch('btnJump', 'jump');
            }

            window.addEventListener('keydown', e => klavesy[e.code] = true);
            window.addEventListener('keyup', e => klavesy[e.code] = false);

            sestav3DLevel(mujLevel);

            if (sb) {
                try {
                    const { data: gData } = await sb.from('games').select('name').ilike('url_path', '%obby-hra%').maybeSingle();
                    if(gData) document.getElementById('dynamicGameName').innerText = gData.name;
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        mojeId = user.id; mujUsername = user.user_metadata.display_name || user.email;
                        mmoKanal = sb.channel('obby_universal_room').on('broadcast', { event: 'tick' }, payload => {
                            const d = payload.payload;
                            if (!vzdaleniHraci[d.id] && !pouzit2DFallback) {
                                const av = vytvorHezkehoAvatara(parseInt(d.color.replace("#", "0x")));
                                scena.add(av); vzdaleniHraci[d.id] = { obj: av };
                            } else if (!vzdaleniHraci[d.id]) { vzdaleniHraci[d.id] = {}; }
                            const v = vzdaleniHraci[d.id];
                            v.username = d.username; v.x = d.x; v.y = d.y; v.level = d.level; v.color = d.color; v.tickTime = Date.now();
                        }).subscribe();
                        setInterval(() => { if(mmoKanal) mmoKanal.send({ type: 'broadcast', event: 'tick', payload: { id: mojeId, username: mujUsername, x: hrac.x, y: hrac.y, color: mojeBarvaHex, level: mujLevel } }); }, 30);
                    }
                } catch(e){}
            }
            loop();
        }

        function loop() {
            requestAnimationFrame(loop);
            const lvlData = vygenerujLevelData(mujLevel);

            if (klavesy['ArrowRight'] || klavesy['KeyD'] || touchStav.right) hrac.rychlostX = 4.2;
            else if (klavesy['ArrowLeft'] || klavesy['KeyA'] || touchStav.left) hrac.rychlostX = -4.2;
            else hrac.rychlostX *= treni;

            if ((klavesy['ArrowUp'] || klavesy['Space'] || klavesy['KeyW'] || touchStav.jump) && !hrac.veVzduchu) {
                hrac.rychlostY = -10.2; hrac.veVzduchu = true;
            }
            hrac.rychlostY += gravitace; hrac.x += hrac.rychlostX; hrac.y += hrac.rychlostY;
            hrac.veVzduchu = true;

            lvlData.platformy.forEach(p => {
                if (hrac.x < p.x + p.w && hrac.x + hrac.sirka > p.x && hrac.y + hrac.vyska > p.y && hrac.y < p.y + p.h) {
                    if (hrac.rychlostY > 0) { hrac.rychlostY = 0; hrac.y = p.y - hrac.vyska; hrac.veVzduchu = false; }
                }
            });
            lvlData.lava.forEach(l => {
                if (hrac.x < l.x + l.w && hrac.x + hrac.sirka > l.x && hrac.y + hrac.vyska > l.y && hrac.y < l.y + l.h) restartHry();
            });
            if (hrac.x < lvlData.cil.x + lvlData.cil.w && hrac.x + hrac.sirka > lvlData.cil.x && hrac.y + hrac.vyska > lvlData.cil.y && hrac.y < lvlData.cil.y + lvlData.cil.h) {
                if (mujLevel < 100) { mujLevel++; document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`; sestav3DLevel(mujLevel); restartHry(); }
            }
            if (hrac.y > 600) restartHry();

            // RENDER SYSTÉM
            if (pouzit2DFallback) {
                // SPUŠTĚN NOUZOVÝ 2D REŽIM
                canvas2D.width = window.innerWidth; canvas2D.height = window.innerHeight;
                ctx2D.clearRect(0,0,canvas2D.width,canvas2D.height);
                ctx2D.save(); ctx2D.scale(canvas2D.width / 1200, canvas2D.height / 600);

                ctx2D.fillStyle = '#252b36'; lvlData.platformy.forEach(p => ctx2D.fillRect(p.x, p.y, p.w, p.h));
                ctx2D.fillStyle = '#ef4444'; lvlData.lava.forEach(l => ctx2D.fillRect(l.x, l.y, l.w, l.h));
                ctx2D.fillStyle = '#10b981'; ctx2D.fillRect(lvlData.cil.x, lvlData.cil.y, lvlData.cil.w, lvlData.cil.h);

                const ted = Date.now();
                for (let id in vzdaleniHraci) {
                    const v = vzdaleniHraci[id];
                    if (ted - v.tickTime < 3000 && v.level === mujLevel) {
                        ctx2D.fillStyle = v.color; ctx2D.fillRect(v.x, v.y, hrac.sirka, hrac.vyska);
                        ctx2D.fillStyle = 'rgba(255,255,255,0.6)'; ctx2D.font = '10px Inter'; ctx2D.fillText(v.username, v.x - 5, v.y - 6);
                    }
                }
                ctx2D.fillStyle = mojeBarvaHex; ctx2D.fillRect(hrac.x, hrac.y, hrac.sirka, hrac.vyska);
                ctx2D.fillStyle = '#fff'; ctx2D.font = 'bold 11px Inter'; ctx2D.fillText(mujUsername, hrac.x - 5, hrac.y - 6);
                ctx2D.restore();
            } else {
                // FUNKČNÍ 3D REŽIM
                lokalniKontejnerAvatar.position.set(hrac.x / 10, (600 - hrac.y) / 10, 0);
                if (Math.abs(hrac.rychlostX) > 0.1) {
                    animacniCas += 0.2;
                    lokalniKontejnerAvatar.userData.nohaL.rotation.z = Math.sin(animacniCas) * 0.5;
                    lokalniKontejnerAvatar.userData.nohaP.rotation.z = -Math.sin(animacniCas) * 0.5;
                }
                const ted = Date.now();
                for (let id in vzdaleniHraci) {
                    const v = vzdaleniHraci[id];
                    if (v.obj) {
                        if (ted - v.tickTime < 3000 && v.level === mujLevel) {
                            v.obj.visible = true; v.obj.position.set(v.x / 10, (600 - v.y) / 10, 0);
                        } else { v.obj.visible = false; }
                    }
                }
                kamera.position.set(hrac.x / 10, ((600 - hrac.y) / 10) + 2, 9);
                kamera.lookAt(hrac.x / 10, (600 - hrac.y) / 10, 0);
                renderer.render(scena, kamera);
            }
        }

        function restartHry() { hrac.x = 60; hrac.y = 300; hrac.rychlostX = 0; hrac.rychlostY = 0; }
        window.addEventListener('resize', () => { if(!pouzit2DFallback && kamera) { kamera.aspect = window.innerWidth / window.innerHeight; kamera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } });
        async function vratSeDoLobby() { if(sb && mojeId){ try{ await sb.from('online_players').update({ current_game: 'Lobby' }).eq('id', mojeId); }catch(e){} } window.location.href = '../index.html'; }
        
        window.onload = startEngine;
    </script>
</body>
</html>
