<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netorikaraft - Mega Obby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

    <style>
        :root {
            --bg-nav: rgba(10, 12, 16, 0.6);
            --accent: #3b82f6;
            --text-main: #ffffff;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; font-family: 'Inter', sans-serif; }

        #gameCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; }

        #gameHeader {
            position: absolute; top: 0; left: 0; width: 100%; padding: 16px 32px;
            background: linear-gradient(to bottom, rgba(10,12,16,0.8), rgba(10,12,16,0));
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .brand-zone { display: flex; align-items: center; gap: 16px; color: var(--text-main); pointer-events: auto; }
        .brand-name { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; text-transform: uppercase; background: linear-gradient(45deg, #ffdd00, #ff5500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .game-tag { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px); }
        .level-tag { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #34d399; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px); }

        .btn-leave {
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; padding: 8px 20px; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 0.85rem; pointer-events: auto; backdrop-filter: blur(4px); transition: all 0.2s;
        }
        .btn-leave:hover { background: rgba(239, 68, 68, 0.4); transform: scale(1.05); }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: rgba(255,255,255,0.7); border-radius: 50%;
            z-index: 5; pointer-events: none; display: none; box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; background: radial-gradient(circle, rgba(15,23,42,0.85) 0%, rgba(10,12,16,0.95) 100%);
            z-index: 100; cursor: pointer; backdrop-filter: blur(12px);
        }
        .start-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 40px 60px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .start-card h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 15px; color: #ffdd00; }
        .start-card p { color: #94a3b8; font-size: 1rem; line-height: 1.6; }

        /* MOBILNÍ OVLÁDÁNÍ - SKRYTÉ PRO PC, ZOBRAZÍ SE JEN DÍKY JS */
        #mobileControls {
            position: absolute; bottom: 40px; left: 0; width: 100%; padding: 0 40px;
            display: none; justify-content: space-between; align-items: center; z-index: 50;
            pointer-events: none;
        }
        .move-container {
            width: 130px; height: 130px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%; position: relative; pointer-events: auto; touch-action: none; backdrop-filter: blur(4px);
        }
        #joystickStick {
            width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%;
            position: absolute; top: 40px; left: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .action-container { pointer-events: auto; }
        .btn-jump-mobile {
            width: 85px; height: 85px; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; color: white; font-weight: 900; font-size: 1.1rem;
            display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); touch-action: none;
        }
        .btn-jump-mobile:active { background: rgba(255, 221, 0, 0.4); border-color: #ffdd00; }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="brand-zone">
            <span class="brand-name">Netorikaraft R15</span>
            <span class="game-tag" id="dynamicGameName">Roblox Pro Obby</span>
            <span class="level-tag" id="levelDisplay">Level 1 / 100</span>
        </div>
        <button class="btn-leave" onclick="vratSeDoLobby()">Leave</button>
    </div>

    <div id="instructions" onclick="zamkniMys()">
        <div class="start-card">
            <h2>SPUSTIT ROBLOX OBBY</h2>
            <p><b>PC:</b> Pohyb přes W, A, S, D | Rozhlížení myší | Skok Mezerník<br><b>Mobil:</b> Joystick na obrazovce | Tažení po pravé straně rozhlíží</p>
            <p style="margin-top: 15px; color: #ffdd00;">Klikni pro start!</p>
        </div>
    </div>

    <div id="mobileControls">
        <div class="move-container" id="joystickZone">
            <div id="joystickStick"></div>
        </div>
        <div class="action-container">
            <div class="btn-jump-mobile" id="btnJumpMobile">JUMP</div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="gameCanvas"></div>

    <script>
        const SUPABASE_URL = "TVOJE_SUPABASE_URL";
        const SUPABASE_KEY = "TVŮJ_ANON_KEY";
        
        let sb = null; let mojeId = null; let mujUsername = "Hráč";
        let mojeBarvaHex = "#" + Math.floor(Math.random()*16777215).toString(16);
        let mujLevel = 1; let mmoKanal = null; let vzdaleniHraci = {};

        try {
            if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_URL !== "TVOJE_SUPABASE_URL") {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) {}

        let scena, kamera, renderer, lokalniKontejnerAvatar;
        let platformyFyzika = []; let lavaFyzika = []; let cilFyzika = null;
        let animacniCas = 0;

        const hrac = {
            pozice: new THREE.Vector3(0, 3, 0),
            rychlost: new THREE.Vector3(0, 0, 0),
            sirka: 0.8, vyska: 2.0, hloubka: 0.8, veVzduchu: true
        };

        const RYCHLOST_POHYBU = 0.15;
        const SILA_SKOKU = 0.24;
        const GRAVITACE = 0.0095;

        // Klíče pro PC a stav pro Mobil
        const klavesy = {};
        let mobilniSmer = { x: 0, y: 0 };
        let mobilniSkok = false;
        let rotaceKamery = { yaw: 0, pitch: 0 };
        let isMobile = false;

        function init3D() {
            const container = document.getElementById('gameCanvas');
            scena = new THREE.Scene();
            scena.background = new THREE.Color(0x0e121a);
            scena.fog = new THREE.FogExp2(0x0e121a, 0.015);

            kamera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // Osvětlení
            scena.add(new THREE.AmbientLight(0xffffff, 0.45));
            scena.add(new THREE.HemisphereLight(0x8bc34a, 0x0e121a, 0.35));

            const slunce = new THREE.DirectionalLight(0xfffbeb, 1.3);
            slunce.position.set(25, 55, 15);
            slunce.castShadow = true;
            slunce.shadow.mapSize.width = 2048;
            slunce.shadow.mapSize.height = 2048;
            slunce.shadow.bias = -0.0004;
            scena.add(slunce);

            // DETEKCE MOBILU - Pokud je to mobil/tablet, zapne se dotykové rozhraní
            isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'flex';
                setupMobilniOvladani();
            }

            // Vytvoření klasického hranatého Roblox R15 avatara
            lokalniKontejnerAvatar = vytvorRobloxAvatara(parseInt(mojeBarvaHex.replace("#", "0x")));
            scena.add(lokalniKontejnerAvatar);

            // Listenery pro PC klávesnici - BĚŽÍ NONSTOP
            window.addEventListener('keydown', e => { klavesy[e.code] = true; });
            window.addEventListener('keyup', e => { klavesy[e.code] = false; });
            
            if (!isMobile) {
                document.addEventListener('mousemove', pohniKamerouPC);
            }

            window.addEventListener('resize', onWindowResize);

            document.addEventListener('pointerlockchange', () => {
                if (isMobile) return;
                if (document.pointerLockElement === container) {
                    document.getElementById('instructions').style.display = 'none';
                    document.getElementById('crosshair').style.display = 'block';
                } else {
                    document.getElementById('instructions').style.display = 'flex';
                    document.getElementById('crosshair').style.display = 'none';
                }
            });
        }

        function zamkniMys() {
            if (isMobile) {
                document.getElementById('instructions').style.display = 'none';
            } else {
                document.getElementById('gameCanvas').requestPointerLock();
            }
        }

        function pohniKamerouPC(e) {
            if (document.pointerLockElement !== document.getElementById('gameCanvas')) return;
            rotaceKamery.yaw -= e.movementX * 0.0025;
            rotaceKamery.pitch -= e.movementY * 0.0025;
            rotaceKamery.pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, rotaceKamery.pitch));
        }

        // 📱 MOBILNÍ TOUCH JOYSTICK + ROZHLÍŽENÍ TAŽENÍM
        function setupMobilniOvladani() {
            const stick = document.getElementById('joystickStick');
            const zone = document.getElementById('joystickZone');
            let drag = false; let startTouchX = 0, startTouchY = 0;

            zone.addEventListener('touchstart', e => {
                drag = true;
                const t = e.touches[0];
                startTouchX = t.clientX; startTouchY = t.clientY;
            });

            window.addEventListener('touchmove', e => {
                if (!drag) return;
                const t = e.touches[0];
                let dx = t.clientX - startTouchX;
                let dy = t.clientY - startTouchY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 45) { dx = (dx/dist)*45; dy = (dy/dist)*45; dist = 45; }
                
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                
                // Normalizace směru chůze
                mobilniSmer.x = dx / 45;
                mobilniSmer.y = dy / 45;
            });

            window.addEventListener('touchend', () => {
                drag = false; stick.style.transform = 'translate(0px, 0px)';
                mobilniSmer.x = 0; mobilniSmer.y = 0;
            });

            // Mobilní skok
            const jBtn = document.getElementById('btnJumpMobile');
            jBtn.addEventListener('touchstart', (e) => { e.preventDefault(); mobilniSkok = true; });
            jBtn.addEventListener('touchend', () => { mobilniSkok = false; });

            // Rozhlížení prstem na pravé půlce obrazovky
            let rTouchId = null; let rLastX = 0, rLastY = 0;
            window.addEventListener('touchstart', e => {
                for(let i=0; i<e.changedTouches.length; i++){
                    let touch = e.changedTouches[i];
                    if(touch.clientX > window.innerWidth / 2) {
                        rTouchId = touch.identifier; rLastX = touch.clientX; rLastY = touch.clientY;
                    }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let i=0; i<e.touches.length; i++){
                    let touch = e.touches[i];
                    if(touch.identifier === rTouchId) {
                        let fX = touch.clientX - rLastX;
                        let fY = touch.clientY - rLastY;
                        rotaceKamery.yaw -= fX * 0.006;
                        rotaceKamery.pitch -= fY * 0.006;
                        rotaceKamery.pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, rotaceKamery.pitch));
                        rLastX = touch.clientX; rLastY = touch.clientY;
                    }
                }
            });
            window.addEventListener('touchend', e => {
                for(let i=0; i<e.changedTouches.length; i++){
                    if(e.changedTouches[i].identifier === rTouchId) rTouchId = null;
                }
            });
        }

        // 🧸 100% ROBLOX BLOCKY AVATAR (Hranatý styl, přesné R15 proporce + tvářička)
        function vytvorRobloxAvatara(barvaHex) {
            const kontejner = new THREE.Group();
            const matTelo = new THREE.MeshStandardMaterial({ color: barvaHex, roughness: 0.3, metalness: 0.0 });
            const matKuzg = new THREE.MeshStandardMaterial({ color: 0xffd1a4, roughness: 0.4 });
            const matKalhoty = new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: 0.5 });

            // Roblox Kostka Trup
            const mTelo = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.0, 0.45), matTelo);
            mTelo.position.y = 0.9; mTelo.castShadow = true; mTelo.receiveShadow = true;
            kontejner.add(mTelo);
            
            // Hranatá hlava
            const mHlava = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matKuzg);
            mHlava.position.y = 1.65; mHlava.castShadow = true;
            kontejner.add(mHlava);

            // Roblox Smile (Očka a pusa vytvořená z malých kostiček pro 3D plastický efekt)
            const matOci = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const okoL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.02), matOci);
            okoL.position.set(-0.12, 1.7, 0.26); kontejner.add(okoL);
            const okoP = okoL.clone(); okoP.position.x = 0.12; kontejner.add(okoP);

            const pusa = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.04, 0.02), matOci);
            pusa.position.set(0, 1.56, 0.26); kontejner.add(pusa);

            // Nohy (Roblox hranoly)
            const mNohaL = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.45, 0.35), matKalhoty);
            mNohaL.position.set(-0.22, 0.225, 0); mNohaL.castShadow = true; kontejner.add(mNohaL);
            const mNohaP = mNohaL.clone(); mNohaP.position.x = 0.22; kontejner.add(mNohaP);

            // Ruce
            const mRukaL = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.85, 0.32), matTelo);
            mRukaL.position.set(-0.58, 0.85, 0); mRukaL.castShadow = true; kontejner.add(mRukaL);
            const mRukaP = mRukaL.clone(); mRukaP.position.x = 0.58; kontejner.add(mRukaP);

            kontejner.userData = { nohaL: mNohaL, nohaP: mNohaP, rukaL: mRukaL, rukaP: mRukaP };
            return kontejner;
        }

        // 🚧 NOVÝ PRO GENERÁTOR (Trasy zatáčí, obsahují barevné stupínky, lasery a delší skoky)
        function sestav3DLevel(n) {
            platformyFyzika.forEach(p => scena.remove(p.mesh));
            lavaFyzika.forEach(l => scena.remove(l.mesh));
            if(cilFyzika) scena.remove(cilFyzika.mesh);

            platformyFyzika = []; lavaFyzika = [];

            const matP = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.4 });
            const matL = new THREE.MeshStandardMaterial({ color: 0xff0033, roughness: 0.1, emissive: 0xff0000, emissiveIntensity: 2.0 });
            const matC = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 1.0, transparent: true, opacity: 0.8 });

            // Start
            vytvorKostku(0, -1, 0, 8, 2, 8, matP, platformyFyzika);

            let akt = new THREE.Vector3(0, 0, -4);
            const segmentu = 12; // Delší a zábavnější mapy

            for(let i=1; i<=segmentu; i++) {
                let s = Math.max(1.5, 3.5 - (n * 0.01));
                
                // Variabilita směru podle čísla plošinky
                akt.x += Math.sin(i * 2 + n) * 4.5;
                akt.y += (i % 2 === 0 ? 0.4 : -0.2);
                akt.z -= 5.5;

                // Duhové barvy plošinek jako v klasických Roblox mega obby barevných drahách
                let barvaObby = new THREE.Color().setHSL((i / segmentu) + (n * 0.1), 0.8, 0.45);
                let matObbyPlat = new THREE.MeshStandardMaterial({ color: barvaObby, roughness: 0.2 });

                vytvorKostku(akt.x, akt.y - 0.25, akt.z, s, 0.5, s, matObbyPlat, platformyFyzika);

                // Roblox nebezpečné červené lasery přes plošinku
                if (i % 3 === 0) {
                    vytvorKostku(akt.x, akt.y + 0.1, akt.z, s * 1.1, 0.2, 0.2, matL, lavaFyzika);
                }
            }

            // Cíl
            akt.z -= 6;
            vytvorKostku(akt.x, akt.y - 1, akt.z, 7, 2, 7, matP, platformyFyzika);

            const mCil = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.5), matC);
            mCil.position.set(akt.x, akt.y + 2, akt.z);
            scena.add(mCil);
            cilFyzika = { mesh: mCil, min: new THREE.Vector3(akt.x-1.5, akt.y, akt.z-0.25), max: new THREE.Vector3(akt.x+1.5, akt.y+4, akt.z+0.25) };

            // Velká záchranná láva pod celou mapou
            vytvorKostku(akt.x / 2, -20, akt.z / 2, 500, 1, 500, matL, lavaFyzika);
        }

        function vytvorKostku(x, y, z, w, h, d, material, pole) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true; mesh.castShadow = true;
            scena.add(mesh);
            pole.push({ mesh, min: new THREE.Vector3(x - w/2, y - h/2, z - d/2), max: new THREE.Vector3(x + w/2, y + h/2, z + d/2) });
        }

        function kontrolaKolize(b1, b2) {
            return (b1.min.x <= b2.max.x && b1.max.x >= b2.min.x) && (b1.min.y <= b2.max.y && b1.max.y >= b2.min.y) && (b1.min.z <= b2.max.z && b1.max.z >= b2.min.z);
        }

        function ziskejHracBox(p) {
            return { min: new THREE.Vector3(p.x - hrac.sirka/2, p.y, p.z - hrac.hloubka/2), max: new THREE.Vector3(p.x + hrac.sirka/2, p.y + hrac.vyska, p.z + hrac.hloubka/2) };
        }

        // 🏃‍♂️ POHYBOVÝ ENGINE (ZCELA OPRAVENO - WASD A JOYSTICK BĚŽÍ 100% NONSTOP BEZ PŘERUŠENÍ)
        function loop() {
            requestAnimationFrame(loop);

            let sVpred = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();
            let sStrana = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotaceKamery.yaw).normalize();

            let rx = 0; let rz = 0;

            // PC Klíče
            if (klavesy['KeyW'] || klavesy['ArrowUp']) { rx += sVpred.x; rz += sVpred.z; }
            if (klavesy['KeyS'] || klavesy['ArrowDown']) { rx -= sVpred.x; rz -= sVpred.z; }
            if (klavesy['KeyA'] || klavesy['ArrowLeft']) { rx -= sStrana.x; rz -= sStrana.z; }
            if (klavesy['KeyD'] || klavesy['ArrowRight']) { rx += sStrana.x; rz += sStrana.z; }

            // Mobilní dotykový joystick sčítání
            if (isMobile && (Math.abs(mobilniSmer.x) > 0.01 || Math.abs(mobilniSmer.y) > 0.01)) {
                // Joystick dopředu/dozadu
                rx -= sVpred.x * mobilniSmer.y; rz -= sVpred.z * mobilniSmer.y;
                // Joystick do stran
                rx += sStrana.x * mobilniSmer.x; rz += sStrana.z * mobilniSmer.x;
            }

            // Aplikace výsledné rychlosti (Pokud se hráč hýbe, normalizuje se vektor, aby neběhal šikmo rychleji)
            let len = Math.sqrt(rx*rx + rz*rz);
            if (len > 0) {
                hrac.rychlost.x = (rx / len) * RYCHLOST_POHYBU;
                hrac.rychlost.z = (rz / len) * RYCHLOST_POHYBU;
            } else {
                hrac.rychlost.x = 0; hrac.rychlost.z = 0;
            }

            // Skákání z obou platforem (PC Mezerník i Mobilní tlačítko)
            if ((klavesy['Space'] || (isMobile && mobilniSkok)) && !hrac.veVzduchu) {
                hrac.rychlost.y = SILA_SKOKU; hrac.veVzduchu = true;
            }
            hrac.rychlost.y -= GRAVITACE;

            // Kompaktní multi-osá AABB kontrola
            hrac.pozice.x += hrac.rychlost.x;
            let hb = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hb, p)) { hrac.pozice.x -= hrac.rychlost.x; hrac.rychlost.x = 0; } });

            hrac.pozice.z += hrac.rychlost.z;
            hb = ziskejHracBox(hrac.pozice);
            platformyFyzika.forEach(p => { if (kontrolaKolize(hb, p)) { hrac.pozice.z -= hrac.rychlost.z; hrac.rychlost.z = 0; } });

            hrac.pozice.y += hrac.rychlost.y;
            hb = ziskejHracBox(hrac.pozice); hrac.veVzduchu = true;
            platformyFyzika.forEach(p => {
                if (kontrolaKolize(hb, p)) {
                    if (hrac.rychlost.y < 0) { hrac.pozice.y = p.max.y; hrac.rychlost.y = 0; hrac.veVzduchu = false; }
                    else if (hrac.rychlost.y > 0) { hrac.pozice.y = p.min.y - hrac.vyska; hrac.rychlost.y = 0; }
                }
            });

            // Detekce nebezpečí
            lavaFyzika.forEach(l => { if (kontrolaKolize(hb, l)) restartHry(); });
            if (cilFyzika && kontrolaKolize(hb, cilFyzika)) {
                mujLevel++; document.getElementById('levelDisplay').innerText = `Level ${mujLevel} / 100`;
                sestav3DLevel(mujLevel); restartHry();
            }
            if (hrac.pozice.y < -17) restartHry();

            // Nastavení pozice postavy a animování končetin
            lokalniKontejnerAvatar.position.copy(hrac.pozice);
            
            if (Math.abs(hrac.rychlost.x) > 0.01 || Math.abs(hrac.rychlost.z) > 0.01) {
                let uhel = Math.atan2(hrac.rychlost.x, hrac.rychlost.z);
                lokalniKontejnerAvatar.rotation.y = uhel;

                animacniCas += 0.26;
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = Math.sin(animacniCas) * 0.7;
                lokalniKontejnerAvatar.userData.nohaP.rotation.x = -Math.sin(animacniCas) * 0.7;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = -Math.sin(animacniCas) * 0.6;
                lokalniKontejnerAvatar.userData.rukaP.rotation.x = Math.sin(animacniCas) * 0.6;
            } else {
                lokalniKontejnerAvatar.userData.nohaL.rotation.x = 0; lokalniKontejnerAvatar.userData.nohaP.rotation.x = 0;
                lokalniKontejnerAvatar.userData.rukaL.rotation.x = 0; lokalniKontejnerAvatar.userData.rukaP.rotation.x = 0;
            }

            // Sync ostatních hráčů
            const nyni = Date.now();
            for (let id in vzdaleniHraci) {
                const v = vzdaleniHraci[id];
                if (v.obj) {
                    if (nyni - v.tickTime < 3000 && v.level === mujLevel) {
                        v.obj.visible = true; v.obj.position.set(v.x, v.y, v.z);
                    } else { v.obj.visible = false; }
                }
            }

            // Výpočet pozice kamery (Pohled z 3. osoby)
            let kvaternionKamery = new THREE.Quaternion().setFromEuler(new THREE.Euler(rotaceKamery.pitch, rotaceKamery.yaw, 0, 'YXZ'));
            let vzdalenostKamery = new THREE.Vector3(0, 2.2, 5.5).applyQuaternion(kvaternionKamery);
            
            kamera.position.copy(hrac.pozice).add(vzdalenostKamery);
            kamera.lookAt(hrac.pozice.x, hrac.pozice.y + 1.1, hrac.pozice.z);

            renderer.render(scena, kamera);
        }

        function restartHry() { hrac.pozice.set(0, 2, 0); hrac.rychlost.set(0, 0, 0); hrac.veVzduchu = true; }
        function onWindowResize() { kamera.aspect = window.innerWidth / window.innerHeight; kamera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        async function startEngine() {
            init3D(); sestav3DLevel(mujLevel);
            if (sb) {
                try {
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        mojeId = user.id; mujUsername = user.user_metadata.display_name || user.email;
                        const { data: gData } = await sb.from('games').select('name').ilike('url_path', '%obby-hra%').maybeSingle();
                        let jmenoHry = gData ? gData.name : "Roblox Pro Obby";
                        document.getElementById('dynamicGameName').innerText = jmenoHry;
                        await sb.from('online_players').update({ current_game: jmenoHry, updated_at: new Date().toISOString() }).eq('id', mojeId);

                        mmoKanal = sb.channel('roblox_final_room').on('broadcast', { event: 'tick' }, payload => {
                            const d = payload.payload;
                            if (!vzdaleniHraci[d.id]) {
                                const av = vytvorRobloxAvatara(parseInt(d.color.replace("#", "0x")));
                                scena.add(av); vzdaleniHraci[d.id] = { obj: av };
                            }
                            const v = vzdaleniHraci[d.id];
                            v.username = d.username; v.x = d.x; v.y = d.y; v.z = d.z; v.level = d.level; v.tickTime = Date.now();
                        }).subscribe();

                        setInterval(() => {
                            if(mmoKanal) mmoKanal.send({ type: 'broadcast', event: 'tick', payload: { id: mojeId, username: mujUsername, x: hrac.pozice.x, y: hrac.pozice.y, z: hrac.pozice.z, color: mojeBarvaHex, level: mujLevel } });
                        }, 30);
                    }
                } catch(e) {}
            }
            loop();
        }

        async function vratSeDoLobby() {
            if (sb && mojeId) { try { await sb.from('online_players').update({ current_game: 'Lobby' }).eq('id', mojeId); } catch(e){} }
            window.location.href = '../index.html';
        }

        window.onload = startEngine;
    </script>
</body>
